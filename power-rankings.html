<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2e50">
<title>Power Rankings — MAFFL HQ</title>
<meta name="description" content="MAFFL Power Rankings — Madden-style franchise ratings for every owner in MAFFL history. 2026 Off-Season Edition.">

<link rel="icon" href="maffl-logo.png" type="image/png">
<link rel="apple-touch-icon" href="maffl-logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="maffl-logo.png">
<meta name="apple-mobile-web-app-title" content="MAFFL HQ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>
  /* Keep same-origin navigation inside the iOS Home-Screen standalone window.
     Without this, tapping an internal link hands off to Safari and the URL bar
     reappears. External / target=_blank links fall through to the Safari overlay. */
  (function () {
    var standalone = ("standalone" in window.navigator) && window.navigator.standalone;
    if (/[?&]diag=1/.test(location.search)) {
      window.addEventListener("DOMContentLoaded", function () {
        var b = document.createElement("div");
        b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;font:12px/1.45 monospace;color:#fff;padding:6px 10px;white-space:pre;background:" + (standalone ? "#0a7d4b" : "#c0392b");
        b.textContent = "navigator.standalone: " + standalone + "   display-mode: " + matchMedia("(display-mode: standalone)").matches + "\npage: " + location.pathname.split("/").pop() + "   referrer: " + (document.referrer || "(none)");
        b.addEventListener("click", function () { b.remove(); });
        document.body.appendChild(b);
      });
    }
    if (!standalone) return;
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest("a[href]");
      if (!a || a.target === "_blank") return;
      if (a.host && a.host !== location.host) return;          // external link
      if (/^(mailto:|tel:|sms:)/i.test(a.getAttribute("href"))) return;
      e.preventDefault();
      var url = a.href;
      if (/[?&]diag=1/.test(location.search) && url.indexOf("diag=1") === -1) url += (url.indexOf("?") === -1 ? "?" : "&") + "diag=1";
      location.href = url;                                  // stay in standalone
    }, false);
  })();
</script>
<meta name="application-name" content="MAFFL HQ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

  /* ---------- Header (matches index.html / weekly.html / rules.html) ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main / page title ---------- */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }
  .page-title-block { margin-bottom: 24px; }
  .page-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0;
  }
  .gold-rule {
    height: 1px;
    background: var(--gold);
    border: 0;
    margin: 0;
  }

  /* ---------- Universal Subpage Header (Launch Roster v1.0) ---------- */
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 12px 20px;
    margin-bottom: 24px;
  }
  .page-header__id { min-width: 0; }
  .page-header__title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-header__subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0;
  }
  .page-header__meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .meta-pill {
    display: inline-flex;
    align-items: center;
    background: #eceff4;
    color: var(--navy);
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    line-height: 1;
    white-space: nowrap;
  }
  @media (max-width: 767px) {
    .page-header__title { font-size: 24px; }
    .page-header__meta {
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
  }
  .version-chips {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    margin-bottom: 16px;
  }
  .version-chip {
    display: inline-flex;
    align-items: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
    line-height: 1;
    white-space: nowrap;
  }
  .version-chip.primary { color: var(--navy); border-color: var(--navy); }
  .version-chip.muted   { color: var(--muted); border-color: var(--muted); }
  .version-divider {
    display: inline-block;
    width: 1px;
    height: 14px;
    background: var(--border);
    flex: 0 0 auto;
  }

  /* ---------- Filter bar ---------- */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 22px 0 20px;
  }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 8px 16px;
    background: var(--surface);
    color: var(--navy);
    border: 1px solid var(--navy);
    border-radius: 100px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .filter-pill:hover { background: var(--navy-soft); }
  .filter-pill.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .filter-pill:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ---------- Card grid ---------- */
  .owner-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    align-items: start;
  }
  .owner-grid.empty::after {
    content: "No owners match this filter.";
    grid-column: 1 / -1;
    font-family: var(--body);
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 24px;
  }

  /* ---------- Owner card ---------- */
  .owner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    position: relative;
  }
  .owner-card:hover {
    box-shadow: 0 4px 14px var(--navy-soft);
  }
  .owner-card.open {
    grid-column: 1 / -1;
    box-shadow: 0 10px 28px var(--navy-shadow);
    border-color: var(--navy-shadow);
    cursor: default;
  }
  .owner-card:focus-within {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .card-row {
    display: grid;
    grid-template-columns: 48px 1fr auto 16px;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
  }
  .card-rank {
    font-family: var(--display);
    font-weight: 700;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
    text-align: left;
    letter-spacing: -0.02em;
  }
  .owner-card[data-active="N"] .card-rank {
    opacity: 0.5;
  }
  .card-identity { min-width: 0; }
  .card-owner-name {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.15;
    margin: 0 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-team {
    font-family: var(--body);
    font-weight: 400;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.2;
    margin: 0 0 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-tier-badges {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  .card-tier-badge {
    display: inline-flex;
    align-items: center;
    background: var(--gold);
    color: var(--navy);
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1;
    padding: 2px 8px;
    border-radius: 3px;
    width: max-content;
    max-width: 100%;
  }
  .card-tier-badge .badge-icon { margin-right: 4px; }
  .card-tier-badge.inactive {
    background: #eef0f4;
    color: #6c7891;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
  .card-ovr {
    text-align: right;
    line-height: 1;
  }
  .card-ovr-value {
    font-family: var(--display);
    font-weight: 700;
    font-size: 24px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .card-ovr-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .card-chev {
    color: var(--navy);
    font-size: 14px;
    line-height: 1;
    transition: transform 0.18s ease;
  }
  .owner-card.open .card-chev { transform: rotate(180deg); }

  /* ---------- Expanded body ---------- */
  .card-body {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .owner-card.open .card-body { display: block; }

  /* Career stats */
  .career-stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: #f8f9fb;
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-num.gold { color: var(--gold-dark); }
  .stat-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 1.1;
  }

  /* Madden bars */
  .madden-bars { margin-bottom: 22px; }
  .madden-row {
    display: grid;
    grid-template-columns: 24px 1fr 32px;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .madden-row:first-child { margin-top: 0; }
  .madden-emoji {
    font-size: 18px;
    line-height: 1;
    text-align: center;
  }
  .madden-track {
    background: #f0f2f5;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }
  .madden-fill {
    height: 100%;
    background: var(--navy);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .madden-fill.heat { background: var(--gold); }
  .madden-value {
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy);
    text-align: right;
  }

  /* Scout report */
  .scout-report {
    border-left: 3px solid var(--gold);
    padding-left: 12px;
    margin-bottom: 22px;
  }
  .scout-report p {
    font-family: var(--body);
    font-style: italic;
    font-size: 14px;
    color: var(--navy);
    line-height: 1.6;
    margin: 0;
  }

  /* Timeline */
  .timeline-section { margin-top: 4px; }
  .timeline-scroll {
    overflow: visible;
    padding: 4px 0 6px;
  }
  .timeline-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .year-cell {
    width: 48px;
    flex: 0 0 48px;
    height: 56px;
    border-radius: 6px;
    background: #f0f2f5;
    color: #5a6478;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0 8px;
    position: relative;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.12s ease, transform 0.12s ease;
  }
  .year-cell:hover {
    border-color: var(--navy);
    transform: translateY(-1px);
  }
  .year-cell .yc-year {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
  }
  .year-cell .yc-icon {
    font-size: 16px;
    line-height: 1;
  }
  /* Cell themes — color priority is enforced in JS */
  .year-cell.champ      { background: var(--gold);    color: var(--navy); }
  .year-cell.runner     { background: #c7c9d1;        color: var(--navy); }
  .year-cell.division   { background: var(--navy);    color: #fff; }
  .year-cell.playoff    { background: #e1f5ee;        color: #167256; }
  .year-cell.lt1        { background: #fde9c7;        color: #8a5a09; }
  .year-cell.ltrunner   { background: #fef4e1;        color: #8a5a09; }
  .year-cell.regular    { background: #f0f2f5;        color: #5a6478; }

  /* Tooltip / popover */
  .year-cell .yc-tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    color: #fff;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: var(--body);
    font-size: 11px;
    line-height: 1.4;
    white-space: nowrap;
    z-index: 10;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.22);
    pointer-events: none;
  }
  .year-cell .yc-tip::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--navy);
  }
  .year-cell .yc-tip-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    margin-bottom: 2px;
    letter-spacing: 0.04em;
  }
  .year-cell .yc-tip-meta {
    color: #c8d1e4;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .year-cell .yc-tip-flags {
    color: var(--gold);
    font-size: 11px;
  }
  .year-cell:hover .yc-tip,
  .year-cell:focus .yc-tip,
  .year-cell.tip-open .yc-tip { display: block; }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .site-footer > div + div { margin-top: 4px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .site-nav { gap: 16px; }
    .site-nav a { font-size: 12px; }
  }
  @media (max-width: 767px) {
    .header-inner { padding: 12px 18px; }
    .brand-logo { height: 40px; }
    .brand-wordmark { font-size: 20px; }
    .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
    .site-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 18px var(--navy-soft);
      padding: 8px 0;
    }
    .site-nav.open { display: flex; }
    .site-nav a {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .site-nav a:last-child { border-bottom: 0; }
    .site-nav a.current { border-bottom: 1px solid var(--border); background: var(--page-bg); }

    main { padding: 24px 16px 40px; }

    .page-title { font-size: 24px; }

    .filter-bar {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .filter-pill { flex: 0 0 auto; }

    .owner-grid { grid-template-columns: 1fr; gap: 12px; }
    .owner-card.open { grid-column: auto; }

    .card-row { grid-template-columns: 40px 1fr auto 14px; gap: 10px; }
    .card-rank { font-size: 24px; }
    .card-ovr-value { font-size: 22px; }

    .career-stats { grid-template-columns: repeat(3, 1fr); }
  }

  /* ---------- Owner Portal: header kicker + "Member Since" ---------- */
  .card-kicker { margin: 4px 0 0; }
  .card-meta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
  }
  .card-since-pill {
    display: inline-flex;
    align-items: center;
    background: var(--navy-soft);
    color: var(--navy);
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1.4;
    padding: 2px 8px;
    border-radius: 3px;
    width: max-content;
    max-width: 100%;
  }

  /* ---------- Owner Portal: section tabs ---------- */
  .portal-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .portal-tab {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    line-height: 1;
    text-align: center;
    color: var(--muted);
    background: #f8f9fb;
    border: 1.5px solid var(--navy);
    border-radius: 6px;
    padding: 11px 8px;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .portal-tab:hover { color: var(--navy); }
  @media (max-width: 400px) {

    var wk = normalizeName(r[3]), lk = normalizeName(r[5]);

      var greater = 0, same = 0;
      vals.forEach(function (x) { if (x > v) greater++; else if (x === v) same++; });
      map[v] = { rank: greater + 1, tie: same > 1 };
    });
    out[m] = map;
  });
  lower.forEach(function (m) {
    var vals = OWNERS_DATA.map(function (o) { return o[m]; })
                          .filter(function (v) { return v != null; });
    var map = {};
    vals.forEach(function (v) {
      if (map[v]) return;
      var fewer = 0, same = 0;
      vals.forEach(function (x) { if (x < v) fewer++; else if (x === v) same++; });
      map[v] = { rank: fewer + 1, tie: same > 1 };
    });
    out[m] = map;
  });
  return out;
})();

function ordinal(n) {
  var s = ["th", "st", "nd", "rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

/* "(T-1st)" style rank chip for a given career metric + value. */
function rankLabel(metric, value) {
  if (value == null) return "";
  var e = STAT_RANKS[metric] && STAT_RANKS[metric][value];
  if (!e) return "";
  return (e.tie ? "T-" : "") + ordinal(e.rank);
}

/* Numeric league rank (not the label) for a metric + value; 9999 when absent. */
function statRankNum(metric, value) {
  var e = STAT_RANKS[metric] && STAT_RANKS[metric][value];
  return e ? e.rank : 9999;
}

/* =====================================================================
 * RENDER
 * ===================================================================== */

function escHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c];
  });
}
/* Canonical owner short names — keyed by normalizeName() of the data display
   form. Falls back to the full name when unmapped. Used in dense repeating
   opponent contexts (Rivals lists, Big Game rows); the card header keeps the
   full owner name. */
var SHORT_NAMES = {
  "joe reilly":"Joe","brian murello / ron murello":"Brian/Ron",
  "jon murello / rick simmons":"Jon/Rick","mike murello":"Mike",
  "david murello":"Dave","todd trozzo":"Troz","tony trozzo":"Tony",
  "chris johnson":"Johnson","jacob nickman":"Jake","bj funari":"BJ",
  "ben funari":"Ben","bob keslar":"Bo","dan reilly":"Dan",
  "jon fetrow":"Fetrow","ed peters":"Ed","tony brooks":"Brooks",
  "braiden snyder":"Braiden","charles lavrinc":"Charlie","sam lavrinc":"Sam",
  "nick yankovich":"Nick","dominic nicastro":"Dom"
};
function shortName(fullName) {
  var k = normalizeName(fullName);
  return SHORT_NAMES[k] || fullName;   // fall back to full name if unmapped
}

/* Decide the priority class for a year cell based on flags. */
function yearCellTheme(entry) {
  // entry = [year, team, w, l, t, c, r, d, p, l1, lr, ps, tier]
  var c = entry[5], r = entry[6], d = entry[7], p = entry[8],
      l1 = entry[9], lr = entry[10], ps = entry[11];
  if (c) return { cls: "champ",    icon: "\u{1F3C6}" }; // 🏆
  if (r) return { cls: "runner",   icon: "\u{1F948}" }; // 🥈
  if (d) return { cls: "division", icon: "\u{1F451}" }; // 👑
  if (p) return { cls: "playoff",  icon: "\u{1F39F}️" }; // 🎟
  if (l1) return { cls: "lt1",     icon: "\u{1F947}" }; // 🥇
  if (lr || ps) return { cls: "ltrunner", icon: "⭐" }; // ⭐
  return { cls: "regular", icon: "" };
}

function flagListForTip(entry) {
  var labels = [];
  if (entry[5]) labels.push("Championship");
  if (entry[6]) labels.push("Runner-Up");
  if (entry[7]) labels.push("Division Title");
  if (entry[8]) labels.push("Playoff Berth");
  if (entry[9]) labels.push("Lower-Tier 1st");
  if (entry[10]) labels.push("Lower-Tier Runner-Up");
  if (entry[11]) labels.push("Promotion Showdown Winner");
  return labels;
}

function tierLabel(t) {
  if (t === "U") return "Upper-Tier";
  if (t === "L") return "Lower-Tier";
  return "Active";
}

function recordString(w, l, t) {
  if (w == null || l == null) return "Pre-2005 (no record)";
  if (t && t > 0) return w + "-" + l + "-" + t;
  return w + "-" + l;
}

function renderTimelineCells(timeline) {
  return timeline.map(function (e) {
    var theme = yearCellTheme(e);
    var year = e[0], team = e[1], w = e[2], l = e[3], t = e[4];
    var flags = flagListForTip(e);
    var tier = tierLabel(e[12]);
    var tipFlags = flags.length ? flags.join(", ") : "Regular Season";
    var tip =
      '<div class="yc-tip" role="tooltip">' +
        '<div class="yc-tip-title">' + escHtml(year) + ' &middot; ' + escHtml(team) + '</div>' +
        '<div class="yc-tip-meta">' + escHtml(recordString(w, l, t)) + ' &middot; ' + escHtml(tier) + '</div>' +
        '<div class="yc-tip-flags">' + escHtml(tipFlags) + '</div>' +
      '</div>';
    return (
      '<button type="button" class="year-cell ' + theme.cls + '" aria-label="' + escHtml(year + ' ' + team + ', ' + recordString(w, l, t) + ', ' + tipFlags) + '">' +
        '<span class="yc-year">' + escHtml(year) + '</span>' +
        '<span class="yc-icon" aria-hidden="true">' + theme.icon + '</span>' +
        tip +
      '</button>'
    );
  }).join("");
}

function tierInfoForRank(rank) {
  if (rank == null) return null;
  if (rank >= 1  && rank <= 4)  return { icon: "\u{1F3D4}️", label: "Mount Rushmore", cls: "tier-rushmore" };
  if (rank >= 5  && rank <= 8)  return { icon: "\u{1F3C5}",       label: "The Elite", cls: "tier-elite" };
  if (rank >= 9  && rank <= 12) return { icon: "\u{1F6E1}️", label: "Upper-Tier Gatekeepers", cls: "tier-gatekeeper" };
  if (rank >= 13 && rank <= 19) return { icon: "\u{1F9D7}‍♂️", label: "Middle of the Pack", cls: "tier-middle" };
  if (rank >= 20 && rank <= 26) return { icon: "\u{1F47B}",       label: "The Departed & The Grinders", cls: "tier-departed" };
  if (rank >= 27 && rank <= 32) return { icon: "\u{1F573}️", label: "The Rookies & The Basement", cls: "tier-basement" };
  return null;
}

function tierBadgeHtml(owner) {
  var info = tierInfoForRank(owner.rank);
  var parts = [];
  if (info) {
    parts.push(
      '<span class="card-tier-badge"><span class="badge-icon">' + info.icon + '</span>' + escHtml(info.label) + '</span>'
    );
  }
  if (!owner.active) {
    parts.push('<span class="card-tier-badge inactive">Inactive</span>');
  }
  if (!parts.length) return "";
  return '<span class="card-tier-badges">' + parts.join("") + '</span>';
}

/* First season the owner appears in the timeline — the franchise's true first
   season. Pre-2005 founding seasons are stored with null W/L/T, so we use the
   first timeline row regardless of record (e.g. Mike Murello → 2002). */
function memberSinceYear(owner) {
  var tl = owner.timeline || [];
  return tl.length ? tl[0][0] : null;
}

/* Last season the owner actually played (W/L/T not all null). Used for the
   tenure pill on inactive owners (e.g. "2008 – 2011"). */
function lastPlayedYear(owner) {
  var tl = owner.timeline || [];
  for (var i = tl.length - 1; i >= 0; i--) {
    var e = tl[i];
    if (e[2] != null || e[3] != null || e[4] != null) return e[0];
  }
  return tl.length ? tl[tl.length - 1][0] : null;
}

/* Distinct, consecutive team names with the year range each spans. Uses the
   full timeline (incl. pre-2005 null-record seasons) so brand history is whole. */
function teamProgression(owner) {
  var tl = owner.timeline || [];
  var groups = [];
  tl.forEach(function (e) {
    var year = e[0], team = e[1];
    var last = groups[groups.length - 1];
    if (last && last.team === team) { last.end = year; }
    else { groups.push({ team: team, start: year, end: year }); }
  });
  return groups;
}

function formatPF(v) {
  if (v == null) return "—";
  return Math.round(v).toLocaleString("en-US");
}

/* Round label for a playoff game type. */
function roundLabel(type) {
  if (type === "C") return "Championship";
  if (type === "T") return "3rd-Place Game";
  if (type === "S") return "Semifinal";
  if (type === "Q") return "Quarterfinal";
  return "Playoff";
}

/* Big Game Matchups — this owner's playoff games (Quarterfinal, Semifinal,
   Championship + 3rd-Place) with final scores, newest first. (The matchup data
   carries no distinct promotion/relegation showdown game type, so only true
   championship-bracket playoff games appear.) */
function renderBigGames(owner) {
  var games = (BIG_GAMES_BY_KEY[owner.key] || []).slice();
  if (!games.length) {
    return '<div class="bg-empty">No playoff games on record.</div>';
  }
  games.sort(function (a, b) { return (b.year - a.year) || a.type.localeCompare(b.type); });
  function rowHtml(g) {
    var opp = KEY_TO_OWNER[g.oppKey];
    var oppName = opp ? opp.name : g.oppKey;
    var verb = g.won ? "def." : "lost to";
    return '<li class="bg-row ' + (g.won ? "bg-win" : "bg-loss") + '">' +
      '<span class="bg-meta"><span class="bg-year">' + escHtml(g.year) + '</span>' +
        '<span class="bg-round">' + escHtml(roundLabel(g.type)) + '</span></span>' +
      '<span class="bg-result">' +
        '<span class="bg-verb">' + verb + '</span> ' + escHtml(shortName(oppName)) +
        ' <span class="bg-score">' + escHtml(g.ownScore) + '–' + escHtml(g.oppScore) + '</span>' +
      '</span>' +
    '</li>';
  }
  // Tease the 2 most recent, reveal the rest behind a "See more" toggle.
  var visible = games.slice(0, 2).map(rowHtml).join("");
  var rest = games.slice(2);
  var html = '<ul class="bg-list">' + visible + '</ul>';
  if (rest.length) {
    html +=
      '<button type="button" class="bg-toggle" aria-expanded="false">See more</button>' +
      '<ul class="bg-list bg-rest" hidden>' + rest.map(rowHtml).join("") + '</ul>';
  }
  return html;
}

/* Rivals — top-3-rated rivalries (rating from RIVALRY_TOP_BY_KEY), each row
   deep-links into rivalry.html with both owners preselected at the H2H result.
   Big Game Matchups + the full-breakdown CTA sit below. */
function renderRivals(owner) {
  var bigGames =
    '<div class="ov-head bg-head">Big Game Matchups</div>' + renderBigGames(owner);
  var rivalryCta =

  var tops = RIVALRY_TOP_BY_KEY[owner.key] || [];

  if (!tops.length) {

    var rows = tops.map(function (t) {
      var oo = KEY_TO_OWNER[t.oppKey], oppName = oo ? oo.name : t.oppKey;
      var badges = t.badges ? '<span class="rvt-badges">' + t.badges + '</span>' : "";
      return '<li>' +
        '<a class="rvt-row" href="rivalry.html#vs=' + escHtml(owner.key) + ',' + escHtml(t.oppKey) + '">' +
          '<span class="rvt-opp">' + escHtml(shortName(oppName)) + '</span>' +
          '<span class="rvt-right">' +
            '<span class="rvt-rating" title="Rivalry Rating">' + t.rating + '</span>' +
            badges +
            '<span class="rvt-rec">' + t.w + '–' + t.l + '</span>' +
          '</span>' +
        '</a>' +
      '</li>';
    }).join("");
    teaser = '<div class="ov-head">Top Rivalries</div><ul class="rvt-list">' + rows + '</ul>';
  }

  return '<div class="rivalry-wrap">' + teaser + bigGames +
    '<div class="rivalry-cta">' + rivalryCta + '</div>' + '</div>';

function fmtMoney(v) {
  if (v == null) return "—";
  return "$" + Math.round(v).toLocaleString("en-US");
}

/* Draft tab — compact auction summary sourced from window.DRAFT_SUMMARY plus a
   deep-link to the owner's full profile in draft.html. The full 5,855-row draft
   history never loads on this page. */
function renderDraftSummary(owner) {
  var cta = '<a class="draft-cta-btn" href="draft.html#owner=' + escHtml(owner.key) +
    '">View full draft profile →</a>';

function renderOwnerCard(owner, index) {
  /* ---- Rank tab: featured 3 + sectioned stat list + Madden ratings + scout ---- */
  /* Sectioned stat catalog. Accolades keep their emoji; Record/Points are plain
     text. PF/PA/Diff use formatPF() for display but rank on the raw numeric
     (rankVal). Prestige entries are eligible to lead the featured row. */
  var SECTIONS = [
    { title: "Accolades", stats: [
      { label: "\u{1F3C6} Rings",        value: owner.rings,       rankKey: "rings", gold: true, prestige: true },
      { label: "\u{1F948} Runner-Ups",   value: owner.runners,     rankKey: "runners", prestige: true },
      { label: "\u{1F451} Div Titles",   value: owner.divTitles,   rankKey: "divTitles", prestige: true },
      { label: "\u{1F949} 3rd Place",    value: owner.thirds,      rankKey: "thirds", prestige: true },
      { label: "\u{1F39F}️ Playoff Apps", value: owner.playoffApps, rankKey: "playoffApps", prestige: true }
    ]},
    { title: "Record", stats: [
      { label: "Reg Wins",     value: owner.regW,        rankKey: "regW" },
      { label: "Reg Losses",   value: owner.regL,        rankKey: "regL" },
      { label: "Total Wins",   value: owner.totW,        rankKey: "totW" },
      { label: "Total Losses", value: owner.totL,        rankKey: "totL" },
      { label: "Total Games",  value: owner.totGames,    rankKey: "totGames" },
      { label: "Win %",        value: owner.winPct + "%", rankKey: "winPct", rankVal: owner.winPct },
      { label: "Years",        value: owner.years,       rankKey: "years" }
    ]},
    { title: "Points", stats: [
      { label: "Total PF",   value: formatPF(owner.totalPF),   rankKey: "totalPF",   rankVal: owner.totalPF },
      { label: "Total PA",   value: formatPF(owner.totalPA),   rankKey: "totalPA",   rankVal: owner.totalPA },
      { label: "Point Diff", value: formatPF(owner.pointDiff), rankKey: "pointDiff", rankVal: owner.pointDiff },
      { label: "PPG",        value: owner.ppg,                 rankKey: "ppg",       rankVal: owner.ppg }
    ]}
  ];

  // Flat catalog derived from SECTIONS so the featured-3 selection code below
  // keeps working unchanged.
  var allStats = SECTIONS.reduce(function (acc, sec) { return acc.concat(sec.stats); }, []);

  // Drop null-valued stats (the two N/A-record owners) so cards show fewer rows,
  // not blanks. Stamp each entry with its catalog order (for stable tie-breaks)
  // and its numeric league rank (mirrors the rankLabel value-vs-rankVal logic).
  var statCatalog = allStats
    .filter(function (s) { return s.value != null && ("rankVal" in s ? s.rankVal != null : true); })
    .map(function (s, i) {
      var rv = ("rankVal" in s) ? s.rankVal : s.value;
      return { s: s, order: i, rank: statRankNum(s.rankKey, rv) };
    });

  // Featured 3: prestige with a positive value first (best rank), then fill from
  // any remaining entries by best rank. Stable on catalog order for ties.
  function byRankThenOrder(a, b) { return (a.rank - b.rank) || (a.order - b.order); }
  var featured = statCatalog
    .filter(function (c) { return c.s.prestige === true && c.rank !== 9999 && Number(c.s.rankVal != null ? c.s.rankVal : c.s.value) > 0; })
    .sort(byRankThenOrder)
    .slice(0, 3);
  var chosen = {};
  featured.forEach(function (c) { chosen[c.order] = true; });
  if (featured.length < 3) {
    statCatalog
      .filter(function (c) { return !chosen[c.order]; })
      .sort(byRankThenOrder)
      .slice(0, 3 - featured.length)
      .forEach(function (c) { featured.push(c); chosen[c.order] = true; });
  }

  // Remaining entries form the compact list, best rank first.
  var rest = statCatalog
    .filter(function (c) { return !chosen[c.order]; })
    .sort(byRankThenOrder);

  var featuredHtml = featured.map(function (c) {
    var s = c.s;
    var rk = rankLabel(s.rankKey, ("rankVal" in s) ? s.rankVal : s.value);
    var rankHtml = rk ? '<div class="stat-rank">(' + escHtml(rk) + ')</div>' : "";
    return (
      '<div class="stat-box">' +
        '<div class="stat-num' + (s.gold ? ' gold' : '') + '">' + escHtml(s.value) + '</div>' +
        '<div class="stat-label">' + escHtml(s.label) + '</div>' +
        rankHtml +
      '</div>'
    );
  }).join("");

  // Featured lookup by rankKey (stable id) so list rows can tie back to the cubes.
  var featuredKeys = {};
  featured.forEach(function (c) { featuredKeys[c.s.rankKey] = true; });

  var sectionsHtml = SECTIONS.map(function (sec) {
    var rows = sec.stats.filter(function (s) {
      return s.value != null && ("rankVal" in s ? s.rankVal != null : true);
    });
    if (!rows.length) return "";
    var cells = rows.map(function (s, i) {
      var rk = rankLabel(s.rankKey, ("rankVal" in s) ? s.rankVal : s.value);
      var chip = rk ? ' <span class="rank-cell__chip">(' + escHtml(rk) + ')</span>' : "";
      var isFeat = featuredKeys[s.rankKey] === true;
      return (
        '<div class="rank-cell' + (isFeat ? ' is-featured' : '') + '">' +
          '<span class="rank-cell__label">' + escHtml(s.label) +
            (isFeat ? '<span class="rank-cell__star">★</span>' : '') +
          '</span>' +
          '<span class="rank-cell__value">' + escHtml(s.value) + chip + '</span>' +
        '</div>'
      );
    }).join("");
    return (
      '<div class="rank-section">' +
        '<div class="rank-section__head">' + escHtml(sec.title) + '</div>' +
        '<div class="rank-grid">' + cells + '</div>' +
      '</div>'
    );
  }).join("");

  var ratings = [
    { emoji: "\u{1F9CA}", label: "Clutch", value: owner.clutch, heat: false },
    { emoji: "\u{1F69C}", label: "Grind",  value: owner.grind,  heat: false },
    { emoji: "\u{1F525}", label: "Heat",   value: owner.heat,   heat: true  }
  ];
  var ratingsHtml = ratings.map(function (r) {
    var hasVal = r.value != null;
    var pct = hasVal ? Math.max(0, Math.min(99, r.value)) : 0;
    return (
      '<div class="madden-row">' +
        '<div class="madden-emoji" aria-label="' + escHtml(r.label) + '">' + r.emoji + '</div>' +
        '<div class="madden-track"><div class="madden-fill' + (r.heat ? ' heat' : '') + '" style="width:' + pct + '%"></div></div>' +
        '<div class="madden-value">' + (hasVal ? escHtml(r.value) : "–") + '</div>' +
      '</div>'
    );
  }).join("");

  var powerHtml =
    '<div class="career-stats featured3">' + featuredHtml + '</div>' +
    sectionsHtml +
    '<div class="madden-bars">' + ratingsHtml + '</div>' +
    '<div class="scout-report"><p>' + escHtml(owner.scout) + '</p></div>';

  /* ---- Season timeline (moved into Overview) ---- */
  var timelineHtml =
    '<div class="timeline-scroll">' +
      '<div class="timeline-row">' + renderTimelineCells(owner.timeline) + '</div>' +
    '</div>';

  /* ---- Section 1 (Overview): team history, tenure, co-owners, timeline ---- */
  var since = memberSinceYear(owner);
  var sincePillText = owner.active
    ? "Since " + since
    : since + " – " + lastPlayedYear(owner);
  var prog = teamProgression(owner);
  function progRange(g, isLast) {
    if (isLast && owner.active) return g.start + "–present";
    return (g.start === g.end) ? String(g.start) : (g.start + "–" + g.end);
  }
  // Earlier brands (all but the current one) are revealed by "See more".
  var earlierProg = prog.slice(0, -1);
  var progItems = earlierProg.map(function (g) {
    return '<li class="prog-item">' +
      '<span class="prog-team">' + escHtml(g.team) + '</span>' +
      '<span class="prog-years">' + escHtml(progRange(g, false)) + '</span>' +
    '</li>';
  }).join("");

  var currentGroup = prog.length ? prog[prog.length - 1] : null;
  var currentTeam = owner.recentTeam || (currentGroup ? currentGroup.team : "");
  var currentYears = currentGroup ? progRange(currentGroup, true) : "";
  var hasEarlier = earlierProg.length > 0;

  var overviewHtml =
    '<div class="ov-section ov-team-section">' +
      '<div class="ov-current-team">' + escHtml(currentTeam) +
        (currentYears ? ' <span class="ov-current-years">' + escHtml(currentYears) + '</span>' : "") +
      '</div>' +
      (hasEarlier
        ? '<button type="button" class="ov-seemore" aria-expanded="false" aria-controls="prog-' + escHtml(owner.key) + '">See more</button>' +
          '<ol class="prog-list" id="prog-' + escHtml(owner.key) + '" hidden>' + progItems + '</ol>'
        : "") +
    '</div>' +
    '<div class="ov-section">' +
      '<div class="ov-head">Season Timeline</div>' +
      '<div class="timeline-section">' + timelineHtml + '</div>' +
    '</div>';

  /* ---- Draft tab: compact summary + deep-link to full profile ---- */
  var draftHtml = renderDraftSummary(owner);

  /* ---- Rivals tab ---- */
  var rivalsHtml = renderRivals(owner);

  /* ---- Collapsed header: rank · name · tier pill · "Member Since" · OVR ---- */
  var info = tierInfoForRank(owner.rank);
  var tierPillHtml = info
    ? '<span class="card-tier-badges card-kicker"><span class="card-tier-badge ' + info.cls + '">' +
        '<span class="badge-icon">' + info.icon + '</span>' + escHtml(info.label) + '</span></span>'
    : "";
  var inactiveBadge = owner.active ? "" : '<span class="card-tier-badge inactive">Inactive</span>';
  var rankDisplay = owner.rank != null ? owner.rank : '–';
  var ovrDisplay = owner.ovr != null ? owner.ovr : '–';

  /* ---- Section tabs ---- */
  function tabBtn(id, label, active) {
    return '<button type="button" class="portal-tab' + (active ? ' active' : '') +
      '" role="tab" aria-selected="' + (active ? 'true' : 'false') + '" data-section="' + id + '">' +
      label + '</button>';
  }
  function panel(id, html, active) {
    return '<div class="portal-panel' + (active ? ' active' : '') + '" data-panel="' + id +
      '" role="tabpanel"' + (active ? '' : ' hidden') + '>' + html + '</div>';
  }

  return (
    '<article class="owner-card" data-key="' + escHtml(owner.key) + '" data-active="' + (owner.active ? "Y" : "N") + '" data-league="' + escHtml(owner.league2026 || "") + '" data-rank="' + escHtml(owner.rank) + '" data-ovr="' + (owner.ovr != null ? owner.ovr : "") + '" data-order="' + index + '">' +
      '<button type="button" class="card-row" aria-expanded="false" aria-controls="body-' + escHtml(owner.key) + '">' +
        '<span class="card-rank" aria-label="Power Rank">' + escHtml(rankDisplay) + '</span>' +
        '<span class="card-identity">' +
          '<h3 class="card-owner-name">' + escHtml(owner.name) + '</h3>' +
          tierPillHtml +
          '<span class="card-meta-row">' +
            '<span class="card-since-pill">' + escHtml(sincePillText) + '</span>' +
            inactiveBadge +
          '</span>' +
        '</span>' +
        '<span class="card-ovr">' +
          '<div class="card-ovr-value">' + escHtml(ovrDisplay) + '</div>' +
          '<div class="card-ovr-label">OVR</div>' +
        '</span>' +
        '<span class="card-chev" aria-hidden="true">▾</span>' +
      '</button>' +
      '<div class="card-body" id="body-' + escHtml(owner.key) + '">' +
        '<div class="portal-tabs" role="tablist" aria-label="Owner sections">' +
          tabBtn("overview", "Overview", true) +
          tabBtn("power", "Rank", false) +
          tabBtn("rivalry", "Rivals", false) +
          tabBtn("draft", "Draft", false) +
        '</div>' +
        panel("overview", overviewHtml, true) +
        panel("power", powerHtml, false) +
        panel("rivalry", rivalsHtml, false) +
        panel("draft", draftHtml, false) +
      '</div>' +
    '</article>'
  );
}

/* =====================================================================
 * INIT
 * ===================================================================== */
(function init() {
  var grid = document.getElementById("ownerGrid");
  grid.innerHTML = OWNERS_DATA.map(renderOwnerCard).join("");

  /* Card expand / collapse */
  grid.addEventListener("click", function (ev) {
    // In-card section tabs (touch-friendly; no hover dependency)
    var tab = ev.target.closest(".portal-tab");
    if (tab && grid.contains(tab)) {
      var body = tab.closest(".card-body");
      var section = tab.getAttribute("data-section");
      body.querySelectorAll(".portal-tab").forEach(function (t) {
        var on = t === tab;
        t.classList.toggle("active", on);
        t.setAttribute("aria-selected", on ? "true" : "false");
      });
      body.querySelectorAll(".portal-panel").forEach(function (p) {
        var on = p.getAttribute("data-panel") === section;
        p.classList.toggle("active", on);
        if (on) p.removeAttribute("hidden"); else p.setAttribute("hidden", "");
      });
      return;
    }

    // Overview "See more" — reveal full team-name progression (tap-friendly)
    var seemore = ev.target.closest(".ov-seemore");
    if (seemore && grid.contains(seemore)) {
      var list = document.getElementById(seemore.getAttribute("aria-controls"));
      var expanded = seemore.getAttribute("aria-expanded") === "true";
      seemore.setAttribute("aria-expanded", expanded ? "false" : "true");
      seemore.textContent = expanded ? "See more" : "See less";
      if (list) { if (expanded) list.setAttribute("hidden", ""); else list.removeAttribute("hidden"); }
      return;
    }

    // Big Game Matchups "See more" — reveal the remaining playoff games (tap-friendly)
    var bgToggle = ev.target.closest(".bg-toggle");
    if (bgToggle && grid.contains(bgToggle)) {
      var bgRest = bgToggle.nextElementSibling;
      var bgExpanded = bgToggle.getAttribute("aria-expanded") === "true";
      bgToggle.setAttribute("aria-expanded", bgExpanded ? "false" : "true");
      bgToggle.textContent = bgExpanded ? "See more" : "See less";
      if (bgRest) { if (bgExpanded) bgRest.setAttribute("hidden", ""); else bgRest.removeAttribute("hidden"); }
      return;
    }

    var head = ev.target.closest(".card-row");
    if (head && grid.contains(head)) {
      // Don't toggle if the click was on a year cell inside the body
      var card = head.closest(".owner-card");
      var open = card.classList.toggle("open");
      head.setAttribute("aria-expanded", open ? "true" : "false");
      return;
    }
    // Year cell tap toggle (for mobile / no-hover devices)
    var yc = ev.target.closest(".year-cell");
    if (yc && grid.contains(yc)) {
      ev.preventDefault();
      // Close any other open tip
      grid.querySelectorAll(".year-cell.tip-open").forEach(function (n) {
        if (n !== yc) n.classList.remove("tip-open");
      });
      yc.classList.toggle("tip-open");
    }
  });

  /* Filter pills */
  var filterBar = document.querySelector(".filter-bar");
  filterBar.addEventListener("click", function (ev) {
    var pill = ev.target.closest(".filter-pill");
    if (!pill) return;
    filterBar.querySelectorAll(".filter-pill").forEach(function (p) {
      p.classList.remove("active");
      p.setAttribute("aria-selected", "false");
    });
    pill.classList.add("active");
    pill.setAttribute("aria-selected", "true");

    var filter = pill.getAttribute("data-filter");
    applyFilter(filter);
  });

  function ovrOf(card) {
    var v = card.getAttribute("data-ovr");
    return (v === "" || v == null) ? -1 : parseInt(v, 10);
  }
  function orderOf(card) {
    return parseInt(card.getAttribute("data-order"), 10) || 0;
  }

  function applyFilter(filter) {
    var anyVisible = false;
    var cards = Array.prototype.slice.call(grid.querySelectorAll(".owner-card"));

    /* "All" sorts purely by OVR descending (active + inactive interleaved; the
       two N/A-rating owners fall to the bottom). Every other view keeps the
       OWNERS_DATA / power-rank order (data-order). */
    var ordered = cards.slice();
    if (filter === "all") {
      ordered.sort(function (a, b) {
        return (ovrOf(b) - ovrOf(a)) || (orderOf(a) - orderOf(b));
      });
    } else {
      ordered.sort(function (a, b) { return orderOf(a) - orderOf(b); });
    }
    ordered.forEach(function (card) { grid.appendChild(card); });

    cards.forEach(function (card) {
      var active = card.getAttribute("data-active") === "Y";
      var league = card.getAttribute("data-league");
      var show = true;
      switch (filter) {
        case "active":   show = active; break;
        case "upper":    show = league === "Upper-Tier"; break;
        case "lower":    show = league === "Lower-Tier"; break;
        case "all":
        default:         show = true;
      }
      card.style.display = show ? "" : "none";
      if (show) anyVisible = true;
    });
    grid.classList.toggle("empty", !anyVisible);
  }

  /* Default landing state = Active filter (the "Active" pill is pre-selected). */
  applyFilter("active");
})();

/* Hamburger nav (mobile) */
(function wireHamburger() {
  var btn = document.getElementById("navToggle");
  var nav = document.getElementById("primaryNav");
  btn.addEventListener("click", function () {
    var open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
  });
})();
</script>

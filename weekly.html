<script>
  /* Keep same-origin navigation inside the iOS Home-Screen standalone window.
     Without this, tapping an internal link hands off to Safari and the URL bar
     reappears. External / target=_blank links fall through to the Safari overlay. */
  (function () {
    var standalone = ("standalone" in window.navigator) && window.navigator.standalone;
    if (/[?&]diag=1/.test(location.search)) {
      window.addEventListener("DOMContentLoaded", function () {
        var b = document.createElement("div");
        b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;font:12px/1.45 monospace;color:#fff;padding:6px 10px;white-space:pre;background:" + (standalone ? "#0a7d4b" : "#c0392b");
        b.textContent = "navigator.standalone: " + standalone + "   display-mode: " + matchMedia("(display-mode: standalone)").matches + "\npage: " + location.pathname.split("/").pop() + "   referrer: " + (document.referrer || "(none)");
        b.addEventListener("click", function () { b.remove(); });
        document.body.appendChild(b);
      });
    }
    if (!standalone) return;
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest("a[href]");
      if (!a || a.target === "_blank") return;
      if (a.host && a.host !== location.host) return;          // external link
      if (/^(mailto:|tel:|sms:)/i.test(a.getAttribute("href"))) return;
      e.preventDefault();
      var url = a.href;
      if (/[?&]diag=1/.test(location.search) && url.indexOf("diag=1") === -1) url += (url.indexOf("?") === -1 ? "?" : "&") + "diag=1";
      location.href = url;                                  // stay in standalone
    }, false);
  })();
</script>

<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  ul { margin: 0; padding: 0; list-style: none; }

  /* ---------- Header (matches index.html) ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Universal Subpage Header (Launch Roster v1.0) ---------- */
  .page-header-band {
    max-width: 1200px;
    margin: 0 auto;
    padding: 22px 24px 0;
  }
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 12px 20px;
    margin-bottom: 22px;
  }
  .page-header__id { min-width: 0; }
  .page-header__title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-header__subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0;
  }
  .page-header__meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .meta-pill {
    display: inline-flex;
    align-items: center;
    background: #eceff4;
    color: var(--navy);
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    line-height: 1;
    white-space: nowrap;
  }

  /* ---------- Week selector bar ---------- */
  .week-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .week-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .page-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--navy);
    letter-spacing: 0.02em;
    margin: 0;
  }
  .week-pill {
    min-height: 36px;
    padding: 8px 14px;
    background: var(--navy);
    color: #fff;
    border-radius: 999px;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .week-pill .chev {
    color: var(--gold);
    font-size: 12px;
    line-height: 1;
    transition: transform 0.18s ease;
  }
  .week-pill[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .week-picker {
    position: absolute;
    top: 100%;
    right: 24px;
    min-width: 220px;
    max-height: 0;
    overflow: hidden;
    background: var(--surface);
    border-radius: 0 0 10px 10px;
    box-shadow: 0 12px 24px var(--navy-shadow);
    border: 1px solid var(--border);
    border-top: 0;
    transition: max-height 0.2s ease;
    z-index: 40;
  }
  .week-picker.open {
    max-height: 60vh;
    overflow-y: auto;
  }
  .week-picker ul { padding: 6px; }
  .week-picker li button {
    width: 100%;
    min-height: 44px;
    padding: 10px 12px;
    text-align: left;
    border-radius: 6px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy);
    letter-spacing: 0.02em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .week-picker li button:hover { background: var(--page-bg); }
  .week-picker li button[aria-current="true"] { background: var(--navy); color: #fff; }
  .week-picker li button[aria-current="true"] .meta { color: #cbd5e8; }
  .week-picker .meta {
    font-family: var(--body);
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0;
  }

  /* ---------- Main ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 56px;
  }

  /* ---------- Hero card ---------- */
  /* ---------- Card grid ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    align-items: start;
  }

  .pulse-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 0.18s ease, opacity 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .pulse-card:hover { border-color: var(--navy-shadow); }
  .pulse-card:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .pulse-card.dim { opacity: 0.45; }
  .pulse-card.open {
    grid-column: 1 / -1;
    cursor: default;
    box-shadow: 0 10px 28px var(--navy-shadow-strong);
    border-color: var(--navy);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .card-head .left {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .card-icon {
    font-size: 20px;
    line-height: 1;
    flex: 0 0 auto;
  }
  .card-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 0;
  }
  .card-chev {
    color: var(--muted);
    font-size: 14px;
    line-height: 1;
    flex: 0 0 auto;
    transition: transform 0.18s ease;
  }
  .pulse-card.open .card-chev { transform: rotate(180deg); color: var(--navy); }

  .card-preview {
    margin-top: 12px;
    font-family: var(--body);
    font-size: 14px;
    color: var(--navy);
    line-height: 1.45;
  }
  .card-preview .muted-line {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }
  .card-preview .strong { font-weight: 700; }
  .card-preview .danger { color: var(--navy); font-weight: 700; }

  .card-body {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .pulse-card.open .card-body { display: block; }
  .pulse-card.open .card-preview { display: none; }

  /* ---------- Standings ---------- */
  .tier-block + .tier-block { margin-top: 18px; }
  .tier-head {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }
  .tier-head .chev {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.18s ease;
  }
  .tier-head[aria-expanded="true"] .chev { transform: rotate(180deg); color: var(--navy); }
  .tier-body { display: none; padding-top: 6px; }
  .tier-head[aria-expanded="true"] + .tier-body { display: block; }

  .div-block + .div-block { margin-top: 8px; }
  .div-head {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .div-head .chev { font-size: 11px; transition: transform 0.18s ease; }
  .div-head[aria-expanded="true"] .chev { transform: rotate(180deg); color: var(--navy); }
  .div-head[aria-expanded="true"] { color: var(--navy); }
  .div-body { display: none; }
  .div-head[aria-expanded="true"] + .div-body { display: block; }

  .row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center;
    gap: 10px;
    min-height: 44px;
    padding: 6px 4px;
    border-top: 1px solid var(--border);
  }
  .row:first-child { border-top: 0; }
  .row .record {
    font-family: var(--display);
    font-weight: 700;
    font-size: 17px;
    color: var(--navy);
    letter-spacing: 0.01em;
  }
  .row .mid { display: flex; flex-direction: column; min-width: 0; }
  .row .team-name {
    font-family: var(--body);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row .owner {
    font-family: var(--body);
    font-weight: 500;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
  }
  .row .pts {
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    min-width: 44px;
    text-align: right;
  }
  .row .pts .pts-label {
    font-size: 10px;
    color: var(--muted);
    margin-left: 2px;
  }
  .streak {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 999px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.04em;
    min-width: 32px;
    justify-content: center;
  }
  .streak.w { background: rgba(29, 158, 117, 0.12); color: var(--win); }
  .streak.l { background: rgba(192, 74, 74, 0.12); color: var(--loss); }
  .cr {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    min-width: 36px;
    text-align: right;
    letter-spacing: 0.02em;
  }
  .cr .cr-label {
    font-size: 10px;
    color: var(--muted);
    margin-left: 2px;
  }

  /* ---------- Survivor ---------- */
  .survivor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .survivor-pool {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    background: var(--page-bg);
  }
  .pool-head {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pool-count {
    font-family: var(--body);
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .pool-head-left { display: flex; align-items: center; gap: 8px; }
  .credit-pill {
    font-family: var(--body);
    font-weight: 700;
    font-size: 10px;
    color: var(--gold-dark);
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    padding: 2px 7px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    white-space: nowrap;
    text-transform: none;
  }
  .pool-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    font-family: var(--body);
    font-size: 13px;
    color: var(--navy);
    border-top: 1px solid var(--border);
  }
  .pool-list li:first-child { border-top: 0; }
  .pool-list .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex: 0 0 auto;
    background: var(--win);
  }
  .pool-list li.eliminated { color: var(--muted); text-decoration: line-through; }
  .pool-list li.eliminated .dot { background: var(--muted); }
  .pool-list li.recent { color: var(--loss); text-decoration: none; font-weight: 700; }
  .pool-list li.recent .dot { background: var(--loss); }
  .pool-list .out-tag {
    margin-left: auto;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: #fff;
    background: var(--loss);
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.06em;
  }
  .pool-list .winner-tag {
    margin-left: auto;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--navy);
    background: var(--gold);
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.06em;
  }

  .survivor-summary {
    font-family: var(--body);
    font-size: 13px;
    color: var(--navy);
    line-height: 1.45;
  }
  .survivor-summary .label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--gold-dark);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* ---------- Credit Tracker ---------- */
  .ct-list { display: flex; flex-direction: column; gap: 10px; }
  .ct-row {
    padding: 12px;

    border: 1px solid var(--border);

  .ct-leader { font-family: var(--body); font-size: 13px; color: var(--navy); }

  }

    font-size: 13px;

  .ct-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .ct-weekly .tier-head { margin-top: 12px; padding: 12px 0; min-height: 44px; }
  .ct-weekly-row + .ct-weekly-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .ct-weekly-wk {
    font-family: var(--display);

    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  /* ---------- News headline (top card preview) ---------- */
  .news-headline {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.25;
    margin-bottom: 8px;
  }

  /* ---------- Elite 5 ---------- */
  .elite-list { display: flex; flex-direction: column; gap: 10px; }
  .elite-row {
    display: flex;
    align-items: flex-start;

    font-weight: 700;

/* --------- HELPERS --------- */
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function streakLabel(n) {
  if (n > 0) return "W" + n;
  if (n < 0) return "L" + Math.abs(n);
  return "—";
}
function streakClass(n) { return n >= 0 ? "w" : "l"; }
function getWeekFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get("week");
  if (!raw) return null;
  const n = parseInt(raw, 10);
  return isNaN(n) ? null : n;
}
function findWeek(weekNumber) {
  return WEEKS.find(w => w.weekNumber === weekNumber) || null;
}
function leaderOfTier(divs) {
  const all = [...divs.divA, ...divs.divB, ...divs.divC, ...divs.divD];
  return all.slice().sort((a, b) => {
    if (b.w !== a.w) return b.w - a.w;
    if (a.l !== b.l) return a.l - b.l;
    return b.points - a.points;
  })[0];
}

/* --------- RENDER: HERO + GRID --------- */
function renderPage(week) {
  const main = document.getElementById("pulseMain");
  main.innerHTML = `
    <section class="card-grid" id="cardGrid" aria-label="Pulse sections">
      ${renderNewsCard(week)}
      ${renderStandingsCard(week)}
      ${renderSurvivorCard(week)}
      ${renderCreditTrackerCard(week)}
      ${renderElite5Card(week)}
    </section>
  `;
  wireCards();
  wireStandingsCollapsibles();
}

/* --------- STANDINGS CARD --------- */
function renderStandingsCard(week) {
  const tierSort = (a, b) => {
    if (b.w !== a.w) return b.w - a.w;
    if (a.l !== b.l) return a.l - b.l;
    return b.points - a.points;
  };
  const upperAll = [
    ...week.upperTier.divA, ...week.upperTier.divB,
    ...week.upperTier.divC, ...week.upperTier.divD
  ].slice().sort(tierSort);
  const topTwoUpper = upperAll.slice(0, 2);
  const lowerLeader = week.lowerTier.slice().sort(tierSort)[0];

  const preview = `
    <div><span class="strong">Upper:</span> ${topTwoUpper.map(t => `${esc(t.team)} ${t.w}-${t.l}`).join(", ")}</div>
    <div style="margin-top:4px"><span class="strong">Lower:</span> ${esc(lowerLeader.team)} ${lowerLeader.w}-${lowerLeader.l}</div>
    <div class="muted-line">Tap for full standings.</div>
  `;

  const upperBody = `
    <div class="tier-block">
      <button class="tier-head" data-toggle="tier" aria-expanded="true">
        <span>Upper-Tier</span><span class="chev" aria-hidden="true">&#9662;</span>
      </button>
      <div class="tier-body">
        ${renderDiv("Division A", week.upperTier.divA, true)}
        ${renderDiv("Division B", week.upperTier.divB, false)}
        ${renderDiv("Division C", week.upperTier.divC, false)}
        ${renderDiv("Division D", week.upperTier.divD, false)}
      </div>
    </div>
    <div class="tier-block">
      <button class="tier-head" data-toggle="tier" aria-expanded="true">
        <span>Lower-Tier</span><span class="chev" aria-hidden="true">&#9662;</span>
      </button>
      <div class="tier-body">
        ${renderRanked(week.lowerTier)}
      </div>
    </div>
  `;

  return cardShell("standings", "🏆", "Standings", preview, upperBody);
}

function renderDiv(name, teams, openByDefault) {
  const sorted = teams.slice().sort((a, b) => {
    if (b.w !== a.w) return b.w - a.w;
    if (a.l !== b.l) return a.l - b.l;
    return b.points - a.points;
  });
  return `
    <div class="div-block">
      <button class="div-head" data-toggle="div" aria-expanded="${openByDefault ? "true" : "false"}">
        <span>${esc(name)}</span><span class="chev" aria-hidden="true">&#9662;</span>
      </button>
      <div class="div-body">
        ${sorted.map(t => row(t)).join("")}
      </div>
    </div>
  `;
}

function renderRanked(teams) {
  const sorted = teams.slice().sort((a, b) => {
    if (b.w !== a.w) return b.w - a.w;
    if (a.l !== b.l) return a.l - b.l;
    return b.points - a.points;
  });
  return sorted.map(t => row(t)).join("");
}

function row(t) {
  return `
    <div class="row">
      <div class="record">${t.w}-${t.l}</div>
      <div class="mid">
        <span class="team-name">${esc(t.team)}</span>
        <span class="owner">${esc(t.owner)}</span>
      </div>
      <div class="meta">
        <span class="pts">${t.points.toFixed(1)}<span class="pts-label">PF</span></span>
        <span class="streak ${streakClass(t.streak)}">${streakLabel(t.streak)}</span>
        <span class="cr">${t.credits}<span class="cr-label">CR</span></span>
      </div>
    </div>
  `;
}

/* --------- SURVIVOR CARD --------- */
function renderSurvivorCard(week) {
  const s = week.survivor;
  const upperAlive = s.upperActive.length;
  const lowerAlive = s.lowerActive.length;
  const bothDone = s.upperConcluded && s.lowerConcluded;

  if (bothDone) {
    const summary = `
      <div class="survivor-summary">
        <div class="label">Survivor</div>
        <div>Upper won by <span class="strong">${esc(s.upperWinner || "—")}</span></div>
        <div>Lower won by <span class="strong">${esc(s.lowerWinner || "—")}</span></div>
      </div>
    `;
    return cardShell("survivor", "💀", "Survivor", summary, summary, /*alwaysCollapsed=*/true);
  }

  const recentUpper = s.upperEliminated.filter(e => e.recent);
  const recentLower = s.lowerEliminated.filter(e => e.recent);
  const recentLine = (recentUpper.length || recentLower.length)
    ? `<div class="muted-line"><span class="danger">💀 ${[...recentUpper, ...recentLower].map(e => esc(e.team)).join(" · ")} out this week.</span></div>`
    : `<div class="muted-line">No fresh skulls this week.</div>`;

  const preview = `
    <div><span class="strong">${upperAlive}</span> alive in Upper · <span class="strong">${lowerAlive}</span> alive in Lower</div>
    ${recentLine}
  `;

  const body = `
    <div class="survivor-grid">
      ${survivorPool("Upper-Tier", s.upperActive, s.upperEliminated, s.upperConcluded, s.upperWinner)}
      ${survivorPool("Lower-Tier", s.lowerActive, s.lowerEliminated, s.lowerConcluded, s.lowerWinner)}
    </div>
  `;

  return cardShell("survivor", "💀", "Survivor", preview, body);
}

function survivorPool(title, active, eliminated, concluded, winner) {
  const activeRows = active.map(t => {
    const isWinner = concluded && winner && t === winner;
    return `
      <li class="${isWinner ? "winner" : ""}">
        <span class="dot"></span>
        <span>${esc(t)}</span>
        ${isWinner ? '<span class="winner-tag">WINNER</span>' : ""}
      </li>
    `;
  }).join("");

  const eliminatedRows = eliminated
    .slice()
    .sort((a, b) => b.week - a.week)
    .map(e => `
      <li class="${e.recent ? "recent" : "eliminated"}">
        <span class="dot"></span>
        <span>${esc(e.team)}</span>
        ${e.recent ? '<span class="out-tag">OUT</span>' : `<span class="out-tag" style="background:var(--muted)">WK ${e.week}</span>`}
      </li>
    `).join("");

  return `
    <div class="survivor-pool">
      <div class="pool-head">
        <span class="pool-head-left">
          <span>${esc(title)}</span>
          <span class="credit-pill">+5 credits</span>
        </span>
        <span class="pool-count">${active.length} alive</span>
      </div>
      <ul class="pool-list">
        ${activeRows}
        ${eliminatedRows}
      </ul>
    </div>
  `;
}

/* --------- CREDIT TRACKER CARD --------- */
function ctCell(item) {
  if (!item) return `<div class="ct-col"></div>`;
  const tier = item.tier; // "U" or "L"
  return `
    <div class="ct-col">
      <span class="tier-badge ${tier}">${tier === "U" ? "Upper" : "Lower"}</span>
      <div class="ct-leader"><span class="strong">${esc(item.leaderTeam)}</span> · ${esc(item.leaderOwner)}</div>
      <div class="ct-value">${esc(item.value)}</div>
      <span class="credit-pill">+${item.credits} credits</span>
    </div>
  `;
}

function hwCell(side, tier) {
  return `
    <div class="ct-col">
      <span class="tier-badge ${tier}">${tier === "U" ? "Upper" : "Lower"}</span>
      <div class="ct-leader"><span class="strong">${esc(side.team)}</span> · ${esc(side.owner)}</div>
      <div class="ct-value">${side.score.toFixed(1)}</div>
    </div>
  `;
}

function renderHighestWeekly(hw) {
  if (!hw || !hw.weeks || !hw.weeks.length) return "";
  const latest = hw.weeks[0];
  const summary = `
    <div class="ct-cat">Highest Weekly Score (Wk ${latest.week}) <span class="credit-pill">+${hw.credits} credit</span></div>
    <div class="ct-split">
      ${hwCell(latest.upper, "U")}
      ${hwCell(latest.lower, "L")}
    </div>
  `;
  const history = hw.weeks.map(wk => `
    <div class="ct-weekly-row">
      <div class="ct-weekly-wk">Week ${wk.week}</div>
      <div class="ct-split">
        ${hwCell(wk.upper, "U")}
        ${hwCell(wk.lower, "L")}
      </div>
    </div>
  `).join("");
  return `
    <li class="ct-row ct-weekly">
      ${summary}
      <button class="tier-head" data-toggle="ctweekly" aria-expanded="false">
        <span>Week-by-Week History</span><span class="chev" aria-hidden="true">&#9662;</span>
      </button>
      <div class="tier-body">
        ${history}
      </div>
    </li>
  `;
}

function renderCreditTrackerCard(week) {
  const items = week.creditTracker || [];
  const hw = week.highestWeekly || null;
  if (!items.length && !hw) return "";

  const preview = week.latestChange
    ? `
      <div class="news-headline" style="font-size:15px">${esc(week.latestChange)}</div>
      <div class="muted-line">Tap for the full credit board.</div>
    `
    : `
      <ul class="ct-preview-list">
        ${[...new Set(items.map(i => i.award.replace(/\s—\s(Upper|Lower)$/, "")))].map(t => `<li>${esc(t)}</li>`).join("")}
      </ul>
    `;

  // Group paired entries by base category — Upper left, Lower right.
  const groups = [];
  const indexOf = {};
  items.forEach(i => {
    const m = i.award.match(/\s—\s(Upper|Lower)$/);
    const base = i.award.replace(/\s—\s(Upper|Lower)$/, "");
    const tier = m && m[1] === "Lower" ? "L" : "U";
    if (!(base in indexOf)) { indexOf[base] = groups.length; groups.push({ base }); }
    groups[indexOf[base]][tier === "U" ? "upper" : "lower"] = Object.assign({ tier }, i);
  });

  const categoryRows = groups.map(g => `
    <li class="ct-row">
      <div class="ct-cat">${esc(g.base)}</div>
      <div class="ct-split">
        ${ctCell(g.upper)}
        ${ctCell(g.lower)}
      </div>
    </li>
  `).join("");

  const body = `
    <ul class="ct-list">
      ${categoryRows}
      ${renderHighestWeekly(hw)}
    </ul>
    <div class="ct-reminder">Reminder: Credits are awarded in the offseason.</div>
  `;
  return cardShell("credittracker", "🪙", "Credit Tracker", preview, body);
}

/* --------- ELITE 5 / BRACKET CARD --------- */
function renderElite5Card(week) {
  if (week.weekNumber >= 14) {
    const preview = `
      <div><span class="strong">Bracket lives here once seeds lock in.</span></div>
      <div class="muted-line">Tap to view the current playoff picture.</div>
    `;
    const body = `
      <div class="bracket-placeholder">
        Playoff bracket placeholder — commissioner adds the bracket structure here when relevant.
      </div>
    `;
    return cardShell("bracket", "🏆", "Playoff Bracket", preview, body);
  }

  const top = week.elite5[0];
  const preview = `
    <div><span class="strong">#1 this week:</span> ${esc(top.team)}</div>
    <div class="muted-line">${esc(top.note)}</div>
  `;

  const body = `
    <div class="elite-list">
      ${week.elite5.map(e => `
        <div class="elite-row ${e.rank === 1 ? "top" : ""}">
          <div class="elite-rank">${e.rank}</div>
          <div class="elite-main">
            <div class="elite-title">
              <span>${esc(e.team)}</span>
              <span class="tier-badge ${e.tier === "U" ? "U" : "L"}">${e.tier === "U" ? "Upper" : "Lower"}</span>
            </div>
            <div class="elite-owner">${esc(e.owner)}</div>
            <div class="elite-note">${esc(e.note)}</div>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  return cardShell("elite", "⭐", "Elite 5", preview, body);
}

/* --------- NEWS CARD --------- */
function renderNewsCard(week) {
  const header = `Week ${week.weekNumber} · ${week.dateString}`;
  const preview = `
    <div class="news-headline">${esc(week.headline)}</div>
    <div class="muted-line">Tap for the rest of the week's news.</div>
  `;

  const body = `
    <ul class="news-list">
      ${week.newsReel.map(item => `
        <li><span class="bullet"></span><span>${esc(item)}</span></li>
      `).join("")}
    </ul>
  `;

  return cardShell("news", "📰", header, preview, body);
}

/* --------- CARD SHELL --------- */
function cardShell(id, icon, title, previewHtml, bodyHtml, alwaysCollapsed) {
  return `
    <article class="pulse-card" data-card="${id}" tabindex="0" role="button" aria-expanded="false">
      <div class="card-head">
        <div class="left">
          <span class="card-icon" aria-hidden="true">${icon}</span>
          <h3 class="card-title">${esc(title)}</h3>
        </div>
        ${alwaysCollapsed ? "" : '<span class="card-chev" aria-hidden="true">&#9662;</span>'}
      </div>
      <div class="card-preview">${previewHtml}</div>
      ${alwaysCollapsed ? "" : `<div class="card-body">${bodyHtml}</div>`}
    </article>
  `;
}

/* --------- WIRING: CARDS (one-at-a-time expand) --------- */
function wireCards() {
  const grid = document.getElementById("cardGrid");
  if (!grid) return;
  const cards = grid.querySelectorAll(".pulse-card");

  cards.forEach(card => {
    const body = card.querySelector(".card-body");
    if (!body) return;

    const toggle = (e) => {
      if (card.classList.contains("open")) {
        if (e.target.closest(".card-head") || e.target === card) {
          closeAll();
        }
        return;
      }
      openOnly(card);
    };

    card.addEventListener("click", (e) => {
      if (e.target.closest("[data-toggle]")) return;
      toggle(e);
    });
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        toggle(e);
      }
      if (e.key === "Escape" && card.classList.contains("open")) {
        closeAll();
      }
    });
  });

  function openOnly(target) {
    cards.forEach(c => {
      if (c === target) {
        c.classList.add("open");
        c.classList.remove("dim");
        c.setAttribute("aria-expanded", "true");
      } else {
        c.classList.remove("open");
        c.classList.add("dim");
        c.setAttribute("aria-expanded", "false");
      }
    });
  }
  function closeAll() {
    cards.forEach(c => {
      c.classList.remove("open", "dim");
      c.setAttribute("aria-expanded", "false");
    });
  }
}

/* --------- WIRING: STANDINGS COLLAPSIBLES --------- */
function wireStandingsCollapsibles() {
  document.querySelectorAll("[data-toggle]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const expanded = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", expanded ? "false" : "true");
    });
  });
}

/* --------- WEEK PICKER --------- */
function renderWeekPicker(activeWeek) {
  const list = document.getElementById("weekPickerList");
  const label = document.getElementById("weekPillLabel");
  label.textContent = "Week " + activeWeek.weekNumber + " Sample";

  list.innerHTML = WEEKS.map(w => `
    <li>
      <button data-week="${w.weekNumber}" aria-current="${w.weekNumber === activeWeek.weekNumber ? "true" : "false"}" role="option">
        <span>Week ${w.weekNumber} Sample</span>
        <span class="meta">${esc(w.dateString)}</span>
      </button>
    </li>
  `).join("");

  list.querySelectorAll("button[data-week]").forEach(b => {
    b.addEventListener("click", () => {
      const n = parseInt(b.getAttribute("data-week"), 10);
      const target = findWeek(n);
      if (!target) return;
      const url = new URL(window.location.href);
      url.searchParams.set("week", String(n));
      window.history.pushState({}, "", url);
      closeWeekPicker();
      renderPage(target);
      renderWeekPicker(target);
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function openWeekPicker() {
  document.getElementById("weekPicker").classList.add("open");
  document.getElementById("weekPill").setAttribute("aria-expanded", "true");
}
function closeWeekPicker() {
  document.getElementById("weekPicker").classList.remove("open");
  document.getElementById("weekPill").setAttribute("aria-expanded", "false");
}

/* --------- OFF-SEASON STATE --------- */
function renderOffseason() {
  const main = document.getElementById("pulseMain");
  document.getElementById("weekBar").style.display = "none";
  main.innerHTML = `
    <section class="offseason-card">
      <h2 class="offseason-head">Weekly Pulse is dark until kickoff.</h2>
      <p class="offseason-sub">The ${SEASON} season is in the books. Check out the year-end content while you wait for September.</p>
      <a class="offseason-cta" href="power-rankings.html">View ${SEASON} Power Rankings &rarr;</a>
    </section>
  `;
}

/* --------- BOOT --------- */
(function init() {
  // Hamburger nav
  const btn = document.getElementById("navToggle");
  const nav = document.getElementById("primaryNav");
  btn.addEventListener("click", () => {
    const open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
  });

  // Off-season short-circuit
  if (IS_OFFSEASON || WEEKS.length === 0) {
    renderOffseason();
    return;
  }

  // Week picker toggle
  const pill = document.getElementById("weekPill");
  pill.addEventListener("click", (e) => {
    e.stopPropagation();
    const open = document.getElementById("weekPicker").classList.contains("open");
    open ? closeWeekPicker() : openWeekPicker();
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#weekPicker") && !e.target.closest("#weekPill")) {
      closeWeekPicker();
    }
  });

  // Back/forward URL navigation
  window.addEventListener("popstate", () => {
    const n = getWeekFromUrl();
    const target = (n && findWeek(n)) || WEEKS[0];
    renderPage(target);
    renderWeekPicker(target);
  });

  // Initial render
  const urlWeek = getWeekFromUrl();
  const activeWeek = (urlWeek && findWeek(urlWeek)) || WEEKS[0];
  renderPage(activeWeek);
  renderWeekPicker(activeWeek);
})();
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speak Up — MAFFL HQ</title>
<meta name="description" content="MAFFL HQ — Speak Up. Vote in the active league poll, suggest rule changes, and send feedback on MAFFL HQ.">

<!-- Favicon + Apple Touch Icon (home-screen icon on iOS / iPadOS) -->
<link rel="icon" href="maffl-logo.png" type="image/png">
<link rel="apple-touch-icon" href="maffl-logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="maffl-logo.png">
<meta name="apple-mobile-web-app-title" content="MAFFL HQ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>
  /* Keep same-origin navigation inside the iOS Home-Screen standalone window.
     Without this, tapping an internal link hands off to Safari and the URL bar
     reappears. External / target=_blank links fall through to the Safari overlay. */
  (function () {
    var standalone = ("standalone" in window.navigator) && window.navigator.standalone;
    if (/[?&]diag=1/.test(location.search)) {
      window.addEventListener("DOMContentLoaded", function () {
        var b = document.createElement("div");
        b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;font:12px/1.45 monospace;color:#fff;padding:6px 10px;white-space:pre;background:" + (standalone ? "#0a7d4b" : "#c0392b");
        b.textContent = "navigator.standalone: " + standalone + "   display-mode: " + matchMedia("(display-mode: standalone)").matches + "\npage: " + location.pathname.split("/").pop() + "   referrer: " + (document.referrer || "(none)");
        b.addEventListener("click", function () { b.remove(); });
        document.body.appendChild(b);
      });
    }
    if (!standalone) return;
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest("a[href]");
      if (!a || a.target === "_blank") return;
      if (a.host && a.host !== location.host) return;          // external link
      if (/^(mailto:|tel:|sms:)/i.test(a.getAttribute("href"))) return;
      e.preventDefault();
      var url = a.href;
      if (/[?&]diag=1/.test(location.search) && url.indexOf("diag=1") === -1) url += (url.indexOf("?") === -1 ? "?" : "&") + "diag=1";
      location.href = url;                                  // stay in standalone
    }, false);
  })();
</script>
<meta name="application-name" content="MAFFL HQ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-hover: #243a62;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.10);
    --navy-shadow-strong: rgba(26, 46, 80, 0.16);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --muted: #8a9ab5;
    --muted-soft: #9aa6bd;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }

  /* ---------- Header ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .brand-logo {
    height: 40px;
    width: auto;
    display: block;
    flex: 0 0 auto;
  }

  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 20px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }

  .site-nav {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 6px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }

  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px 20px;
  }

  .stack > * + * { margin-top: 20px; }

  /* ---------- Prizes & Dues / shared card section ---------- */
  .dues-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .dues-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .dues-head h2 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 20px;
    color: var(--navy);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .dues-note {
    font-family: var(--body);
    font-weight: 400;
    font-size: 12px;
    color: var(--muted);
    margin: 0;
  }

  .dues-venmo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    color: #fff;
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 14px var(--navy-shadow);
    transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    margin-bottom: 20px;
  }
  .dues-venmo:hover {
    background: var(--navy-hover);
    box-shadow: 0 6px 18px var(--navy-shadow-strong);
    transform: translateY(-1px);
  }
  .dues-venmo:active { transform: translateY(0); }
  .dues-venmo:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .dues-tiers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .dues-tier h3 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 0 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .dues-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--body);
    font-size: 14px;
    color: var(--navy);
  }
  .dues-table th,
  .dues-table td {
    text-align: left;
    padding: 8px 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .dues-table th {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .dues-table th:last-child,
  .dues-table td:last-child {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    white-space: nowrap;
  }
  .dues-table tbody tr:last-child td { border-bottom: 0; }

  /* ---------- Page-specific: credit count ---------- */

  /* Snapshot note — makes it clear this is hand-updated, not live. */
  .snapshot-note {
    font-family: var(--body);
    font-size: 13px;
    color: var(--muted);
    margin: 0 0 16px;
    line-height: 1.5;
  }
  .snapshot-note strong { color: var(--navy); font-weight: 700; }

  /* "Read the full Credit rules" link — reuses the navy/gold button language
     of the site's .dues-venmo so it sits consistently with the rest. */
  .rules-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--navy);
    color: #fff;
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    padding: 12px 20px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 14px var(--navy-shadow);
    transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    margin-bottom: 20px;
  }
  .rules-link:hover {
    background: var(--navy-hover);
    box-shadow: 0 6px 18px var(--navy-shadow-strong);
    transform: translateY(-1px);
  }
  .rules-link:active { transform: translateY(0); }
  .rules-link:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  /* Owner-name links inside the credit tables — keep them obviously tappable. */
  .dues-table td a {
    color: var(--navy);
    font-weight: 500;
    border-bottom: 1px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .dues-table td a:hover {
    color: var(--gold-dark);
    border-bottom-color: var(--gold);
  }
  .dues-table td a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 3px;
  }

  /* ---------- Credit Portal: header row, date tag, tabs ---------- */
  .portal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .portal-head h2 {
    font-family: var(--display);
    font-weight: 700;
    font-size: 24px;
    color: var(--navy);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  /* Lead cluster: heading + date tag grouped on one side. .portal-head's
     space-between then pushes the Credit Ruleset button to the opposite end. */
  .portal-head__lead {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    min-width: 0;
  }

  /* Solid date stamp — bump the date each time the balances are revised. */
  .update-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--navy);
    color: #fff;
    border-left: 4px solid var(--gold);
    border-radius: 8px;
    padding: 9px 16px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    box-shadow: 0 4px 14px var(--navy-shadow);
  }
  .update-tag__label { color: var(--gold); }

  /* Version + last-update chips — mirrors rules.html's .version-chips. */
  .version-chips {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
  }
  .version-chip {
    display: inline-flex;
    align-items: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
    line-height: 1;
    white-space: nowrap;
  }
  .version-chip.primary { color: var(--navy); border-color: var(--navy); }
  .version-chip.muted   { color: var(--muted); border-color: var(--muted); }
  .version-divider {
    display: inline-block;
    width: 1px;
    height: 14px;
    background: var(--border);
    flex: 0 0 auto;
  }

  /* ---------- Universal Subpage Header (Launch Roster v1.0) ---------- */
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 12px 20px;
    margin-bottom: 24px;
  }
  .page-header__id { min-width: 0; }
  .page-header__title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-header__subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0;
  }
  .page-header__meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .meta-pill {
    display: inline-flex;
    align-items: center;
    background: #eceff4;
    color: var(--navy);
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    line-height: 1;
    white-space: nowrap;
  }
  @media (max-width: 767px) {
    .page-header__title { font-size: 24px; }
    .page-header__meta {
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
  }

  /* Group the two header buttons together so space-between pushes the pair right. */
  .portal-head__actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Smaller variant of the navy/gold rules button — sits inline in the portal header. */
  .rules-link--sm {
    margin-bottom: 0;
    padding: 9px 16px;
    font-size: 13px;
  }

  /* Credit Request — gold fill / navy text so it reads as a distinct action from
     the navy Credit Ruleset button beside it. */
  .rules-link--request {
    background: var(--gold);
    color: var(--navy);
    border-left-color: var(--navy);
  }
  .rules-link--request:hover {
    background: var(--gold-dark);
    color: var(--navy);
  }

  /* ---------- Tabs ---------- */
  .portal-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .portal-tab {
    appearance: none;
    background: none;
    border: 0;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    padding: 10px 16px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .portal-tab:hover { color: var(--navy); }
  .portal-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
  .portal-tab:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .portal-panel[hidden] { display: none; }

  /* ---------- Speak Up: Google Form embeds ---------- */
  .form-embed { width: 100%; }
  .form-frame {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    min-height: 720px;
    box-shadow: 0 4px 14px var(--navy-shadow);
  }
  @media (max-width: 767px) {
    .form-frame { min-height: 640px; border-radius: 10px; }
  }

  /* ---------- Request Credits embed ---------- */
  .request-note { margin-bottom: 16px; }
  .request-embed {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
  }
  .request-embed iframe {
    display: block;
    width: 100%;
    min-height: 720px;
    border: 0;
  }
  @media (max-width: 767px) {
    .request-embed iframe { min-height: 640px; }
  }

  /* ---------- Credit Registry ---------- */
  .registry-toolbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }
  .registry-summary {
    font-family: var(--body);
    font-size: 13px;
    color: var(--muted);
  }
  .registry-summary strong { color: var(--navy); font-weight: 700; }

  /* Live search box — filters rows against owner / team / type / notes. */
  .registry-search { flex: 1 1 260px; max-width: 360px; }
  .registry-search input {
    width: 100%;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
  }
  .registry-search input::placeholder { color: var(--muted-soft); }
  .registry-search input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* Collapsible multi-select pill facets (owner / credit type / category).
     Each <details> facet is collapsed by default and toggles independently. */
  .registry-filters {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .registry-facet {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
  }
  .registry-facet > summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .registry-facet > summary::-webkit-details-marker { display: none; }
  .registry-facet > summary:hover { color: var(--navy); }
  .registry-facet > summary:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 8px;
  }
  .registry-facet > summary::after {
    content: "\203A";                 /* › chevron, rotates when open */
    margin-left: auto;
    font-size: 16px;
    line-height: 1;
    color: var(--muted);
    transition: transform 0.15s ease;
  }
  .registry-facet[open] > summary::after { transform: rotate(90deg); }
  .registry-facet[open] > summary { border-bottom: 1px solid var(--border); }
  /* Active-count hint so selections stay visible while a facet is collapsed. */
  .facet-count {
    font-family: var(--body);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0;
    text-transform: none;
    color: var(--gold-dark);
  }
  .facet-count:empty { display: none; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px; }
  .pill {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 14px;
    min-height: 40px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .pill:hover { border-color: var(--gold); }
  .pill[aria-pressed="true"] {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .pill:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .registry-table-wrap { overflow-x: auto; }
  .registry-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--body);
    font-size: 14px;
    color: var(--navy);
  }
  .registry-table th,
  .registry-table td {
    text-align: left;
    padding: 8px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .registry-table th {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .registry-table th.num,
  .registry-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    white-space: nowrap;
  }
  .registry-table tbody tr:last-child td { border-bottom: 0; }

  .registry-owner { font-weight: 700; white-space: nowrap; }
  .registry-team {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }
  .registry-type { font-weight: 500; }
  .registry-notes {
    font-size: 13px;
    color: var(--muted-soft);
    line-height: 1.45;
    min-width: 220px;
  }
  .registry-amount { color: var(--win); }   /* Earn  → green */
  .registry-spend  { color: var(--loss); }  /* Spend → red (future-proof) */
  .registry-empty td {
    text-align: center;
    color: var(--muted);
    padding: 28px 10px;
  }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    text-align: center;
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .site-footer > div + div { margin-top: 4px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 767px) {
    .header-inner { padding: 10px 16px; }
    .brand-logo { height: 36px; }
    .brand-wordmark { font-size: 18px; }

<script>
  (function wireHamburger() {
    const btn = document.getElementById("navToggle");
    const nav = document.getElementById("primaryNav");
    btn.addEventListener("click", function () {
      const open = nav.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
      btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
    });
  })();

  (function wirePortalTabs() {
    const tabs = Array.from(document.querySelectorAll(".portal-tab"));
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        tabs.forEach(function (t) {
          const selected = t === tab;
          t.classList.toggle("active", selected);
          t.setAttribute("aria-selected", selected ? "true" : "false");
          document.getElementById(t.getAttribute("aria-controls")).hidden = !selected;
        });
      });
    });
  })();
</script>

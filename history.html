<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2e50">
<title>History — MAFFL HQ</title>
<meta name="description" content="MAFFL History — 24 years of fantasy football champions, runner-ups, playoff fields, and draft highlights, browsable year by year.">

<link rel="icon" href="maffl-logo.png" type="image/png">
<link rel="apple-touch-icon" href="maffl-logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="maffl-logo.png">
<meta name="apple-mobile-web-app-title" content="MAFFL HQ">
<meta name="application-name" content="MAFFL HQ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

  /* ---------- Header ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main / page title ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }
  .page-title-block { margin-bottom: 28px; }
  .page-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .gold-rule {
    height: 1px;
    background: var(--gold);
    border: 0;
    margin: 0;
  }

  /* ---------- Era section ---------- */
  .era-section { margin-bottom: 32px; }
  .era-section:last-of-type { margin-bottom: 0; }
  .era-head {
    margin: 0 0 14px;
  }
  .era-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    line-height: 1.1;
    margin: 0 0 2px;
  }
  .era-range {
    font-family: var(--body);
    font-weight: 400;
    font-size: 12px;
    color: var(--muted);
    margin: 0;
  }

  /* ---------- Year tile grid ---------- */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .year-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    min-height: 88px;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    text-align: left;
    width: 100%;
    display: block;
  }
  .year-tile:hover,
  .year-tile:focus-visible {
    transform: translateY(-2px);
    border-color: var(--navy);
    box-shadow: 0 8px 22px var(--navy-shadow);
    outline: none;
  }
  .year-tile.expanded {
    grid-column: 1 / -1;
    cursor: default;
    transform: none;
    border-color: var(--navy);
    box-shadow: 0 10px 26px var(--navy-shadow);
    padding: 28px 32px 24px;
  }
  .year-tile.expanded:hover { transform: none; }

  .year-collapsed {
    position: relative;
    padding-right: 28px;
  }
  .year-tile.expanded .year-collapsed { display: none; }

  .year-num {
    font-family: var(--display);
    font-weight: 700;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
    margin: 0 0 8px;
    letter-spacing: 0.01em;
  }
  .year-champ-line {
    font-family: var(--display);
    font-weight: 600;
    font-size: 16px;
    color: var(--navy);
    line-height: 1.25;
    margin: 0;
  }
  .year-champ-line .trophy { margin-right: 4px; }

  .year-chevron {
    position: absolute;
    top: 0;
    right: 0;
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--muted);
    line-height: 1;
  }

  .founding-pill {
    display: inline-block;
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    color: var(--gold-dark);
    background: var(--gold-soft);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 4px 8px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  /* ---------- Expanded view ---------- */
  .year-expanded { display: none; }
  .year-tile.expanded .year-expanded { display: block; }

  .exp-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .exp-year {
    font-family: var(--display);
    font-weight: 700;
    font-size: 36px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .era-chip {
    display: inline-block;
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--gold-dark);
    background: var(--gold-soft);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding: 5px 10px;
    border-radius: 100px;
    line-height: 1;
  }

  .winners-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 22px;
  }
  .winner-card {
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 14px 16px;
    background: var(--gold-soft);
  }
  .winner-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--gold-dark);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin: 0 0 6px;
    line-height: 1;
  }
  .winner-owner {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.2;
    margin: 0 0 2px;
  }
  .winner-team {
    font-family: var(--body);
    font-weight: 500;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.2;
    margin: 0;
  }
  .winner-record {
    font-family: var(--body);
    font-weight: 600;
    font-size: 12px;
    color: var(--navy);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .winner-card.no-data {
    border-style: dashed;
    background: transparent;
  }
  .winner-card.no-data .winner-owner { color: var(--muted); font-weight: 600; font-size: 14px; }

  .exp-section {
    margin-bottom: 22px;
  }
  .exp-section:last-of-type { margin-bottom: 0; }
  .exp-section-head {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 10px;
    line-height: 1;
  }

  /* Division Winners list */
  .div-winners {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 18px;
  }
  .div-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--body);
    font-size: 13px;
    line-height: 1.3;
  }
  .div-pill {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: #fff;
    background: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 100px;
    line-height: 1;
    white-space: nowrap;
  }
  .div-team {
    font-weight: 600;
    color: var(--navy);
  }
  .div-owner {
    color: var(--muted);
  }
  .div-team::after { content: " · "; color: var(--muted); font-weight: 400; }

  /* Playoff list */
  .playoff-list {
    font-family: var(--body);
    font-weight: 500;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin: 0;
  }
  .playoff-list .top-team {
    color: var(--navy);
    font-weight: 700;
  }
  .playoff-list .badge { margin-right: 2px; }

  /* Lower tier */
  .lower-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .lower-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .lower-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 4px;
    line-height: 1;
  }
  .lower-name {
    font-family: var(--body);
    font-weight: 600;
    font-size: 14px;
    color: var(--navy);
    line-height: 1.2;
  }
  .lower-team {
    font-family: var(--body);
    font-weight: 400;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.2;
  }

  /* Roster That Season */
  .roster-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px 22px;
  }
  .roster-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-family: var(--body);
    font-size: 13px;
    border-bottom: 1px dashed var(--border);
    padding: 4px 0;
  }
  .roster-row:last-of-type { border-bottom: 0; }
  .roster-owner {
    font-weight: 600;
    color: var(--navy);
  }
  .roster-place {
    color: var(--muted);
    font-size: 12px;
    text-align: right;
    white-space: nowrap;
  }

  /* Draft Highlights */
  .draft-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .draft-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .draft-card-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 10px;
    line-height: 1;
  }
  .pick-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
    font-family: var(--body);
    font-size: 13px;
    line-height: 1.2;
  }
  .pick-row:first-of-type { border-top: 0; padding-top: 0; }
  .pick-player {
    font-weight: 600;
    color: var(--navy);
    flex: 1 1 auto;
    min-width: 0;
  }
  .pick-trophy { color: var(--gold-dark); margin-right: 2px; }
  .pos-pill {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    color: var(--muted);
    background: var(--page-bg);
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1;
  }
  .pick-price {
    flex: 0 0 auto;
    font-family: var(--body);
    font-weight: 700;
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 0.02em;
    min-width: 36px;
    text-align: right;
  }
  .pick-owner {
    flex: 0 0 auto;
    font-family: var(--body);
    font-weight: 500;
    font-size: 11px;
    color: var(--muted);
    max-width: 110px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .draft-link {
    display: inline-block;
    font-family: var(--body);
    font-weight: 600;
    font-size: 14px;
    color: var(--navy);
    border-bottom: 1px solid var(--gold);
    padding-bottom: 2px;
    margin-top: 4px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .draft-link:hover { color: var(--gold-dark); border-color: var(--gold-dark); }

  /* Collapse control */
  .collapse-row {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .collapse-btn {
    font-family: var(--body);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    letter-spacing: 0.04em;
    cursor: pointer;
    padding: 6px 12px;
    transition: color 0.15s ease;
  }
  .collapse-btn:hover { color: var(--gold-dark); }
  .collapse-btn:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .site-nav { gap: 16px; }
    .site-nav a { font-size: 12px; }
    .year-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 767px) {
    .header-inner { padding: 12px 18px; }
    .brand-logo { height: 40px; }
    .brand-wordmark { font-size: 20px; }
    .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
    .site-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 18px var(--navy-soft);
      padding: 8px 0;
    }
    .site-nav.open { display: flex; }
    .site-nav a {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .site-nav a:last-child { border-bottom: 0; }
    .site-nav a.current { border-bottom: 1px solid var(--border); background: var(--page-bg); }

    main { padding: 24px 16px 40px; }
    .page-title { font-size: 24px; }

    .year-grid { grid-template-columns: 1fr; gap: 12px; }
    .year-tile { padding: 20px; min-height: 88px; }
    .year-tile.expanded { padding: 22px 20px 18px; }

    .exp-year { font-size: 30px; }
    .winners-row { grid-template-columns: 1fr; gap: 10px; }
    .div-winners { grid-template-columns: 1fr; }
    .roster-grid { grid-template-columns: 1fr; }
    .lower-grid { grid-template-columns: 1fr; }
    .draft-row { grid-template-columns: 1fr; }

    .pick-owner { max-width: 90px; font-size: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .year-tile, .draft-link, .site-nav a, .collapse-btn { transition: none; }
    .year-tile:hover { transform: none; }
  }
</style>
</head>

<script>
/* =====================================================================
 * MAFFL HISTORY PAGE
 * Renders 24 years of league history grouped by structural era.
 * Tap a year tile to expand inline (multiple can be open).
 * ===================================================================== */

/* ---------- Owner name normalization ---------- */
function normalizeOwner(raw) {
  if (!raw) return "";
  let n = String(raw).replace(/\r?\n/g, " ").trim();
  n = n.replace(/\s*\/\s*/g, "/");
  n = n.replace(/\s+/g, " ");
  if (n === "Michael Murello") return "Mike Murello";
  return n;
}

/* ---------- CSV parser (handles quoted fields) ---------- */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { cell += '"'; i++; }
        else { inQuotes = false; }
      } else { cell += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(cell); cell = ""; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
      else if (c === '\r') { /* skip */ }
      else { cell += c; }
    }
  }
  if (cell.length || row.length) { row.push(cell); rows.push(row); }
  if (rows.length === 0) return [];
  const headers = rows[0];
  return rows.slice(1).filter(r => r.length && r.some(v => v !== "")).map(r => {
    const obj = {};
    for (let i = 0; i < headers.length; i++) obj[headers[i]] = (r[i] ?? "").trim();
    return obj;
  });
}

const SEASONS = parseCSV(document.getElementById("csv-seasons").textContent);
const DIVISIONS = parseCSV(document.getElementById("csv-divisions").textContent);
const DRAFTS = parseCSV(document.getElementById("csv-drafts").textContent);

/* ---------- Index data by year ---------- */
const byYear = {};
function getYearBucket(y) {
  if (!byYear[y]) {
    byYear[y] = {
      year: y,
      champion: null,        // {owner, team, w, l, t}
      coChampions: [],       // for 2002
      runnerUp: null,
      playoffOwners: [],     // list of {owner, team}
      divisionWinners: [],   // [{division, team, owner}]
      lowerTierChamp: null,  // {owner, team}
      lowerTierRunnerUp: null,
      promotionWinner: null,
      roster: [],            // list of {owner, tier, conf, division}
      draftPicks: [],        // [{owner, player, position, price}]
    };
  }
  return byYear[y];
}

/* Pass 1: cleaned_maffl_revised — pull champ/runner/playoff/lower-tier flags */
SEASONS.forEach(r => {
  const yr = parseInt(r.YEAR, 10);
  if (!yr) return;
  const isSeason = r.Season === "1";
  const owner = normalizeOwner(r.Owner);
  const team = (r.TEAM || "").trim();
  const w = r.W ? parseFloat(r.W) : null;
  const l = r.L ? parseFloat(r.L) : null;
  const t = r.T ? parseFloat(r.T) : null;
  const bucket = getYearBucket(yr);

  // championship rosters (Champ=1) may be flagged on a non-season row too
  if (r.Champ === "1") {
    const entry = { owner, team, w, l, t };
    if (yr === 2002) {
      bucket.coChampions.push(entry);
    } else if (!bucket.champion) {
      bucket.champion = entry;
    }
  }
  if (r.Runner === "1" && !bucket.runnerUp) {
    bucket.runnerUp = { owner, team, w, l, t };
  }
  if (r["Lower-Tier 1st"] === "1" && !bucket.lowerTierChamp) {
    bucket.lowerTierChamp = { owner, team };
  }
  if (r["Lower-Tier Runner Up"] === "1" && !bucket.lowerTierRunnerUp) {
    bucket.lowerTierRunnerUp = { owner, team };
  }
  if (r["Promotion Showdown Winner"] === "1" && !bucket.promotionWinner) {
    bucket.promotionWinner = { owner, team };
  }
  if (r.Playoff === "1" && isSeason) {
    bucket.playoffOwners.push({ owner, team });
  }
  // For 2002-2004 (founding) we need a roster — Season=1 rows give us that
  if (isSeason && yr <= 2004) {
    if (!bucket.roster.find(x => x.owner === owner)) {
      bucket.roster.push({ owner, team, tier: "Founding Era", conf: "", division: "" });
    }
  }
});

/* Pass 2: Division History — divisions winners + roster for 2005+ */
DIVISIONS.forEach(r => {
  const yr = parseInt(r.Year, 10);
  if (!yr) return;
  const tier = (r.Tier || "").trim();
  const conf = (r.Conference || "").trim();
  const div = (r.Division || "").trim();
  const rank = parseInt(r.Division_Rank, 10);
  const team = (r.Team || "").trim();
  const owner = normalizeOwner(r.Owner);
  const bucket = getYearBucket(yr);

  if (rank === 1 && tier === "Upper") {
    bucket.divisionWinners.push({ division: div, team, owner });
  }
  if (!bucket.roster.find(x => x.owner === owner && x.team === team)) {
    bucket.roster.push({ owner, team, tier, conf, division: div });
  }
});

/* Pass 3: Drafts */
DRAFTS.forEach(r => {
  const yr = parseInt(r.Year, 10);
  if (!yr) return;
  const owner = normalizeOwner(r.Owner);
  const player = (r.Player || r.Player_Raw || "").trim();
  const position = (r.Position_Actual || "").trim();
  const price = parseFloat(r.Price) || 0;
  const bucket = getYearBucket(yr);
  bucket.draftPicks.push({ owner, player, position, price });
});

/* ---------- Era definitions (newest first) ---------- */
const ERAS = [
  {
    id: "era-2tier",
    title: "2-Tier Era",
    range: "2025+",
    short: "2-Tier",
    years: [2025],
  },
  {
    id: "era-cuoco",
    title: "16-Team Era IV — Cuoco / Kunis / Stone / Upton",
    range: "2014 – 2024",
    short: "16-Team Era IV",
    years: range(2024, 2014),
  },
  {
    id: "era-popstar",
    title: "16-Team Era III — Pop-Star Divisions",
    range: "2013",
    short: "16-Team Era III",
    years: [2013],
  },
  {
    id: "era-kardashian",
    title: "16-Team Era II — Kardashian / Lautner",
    range: "2010 – 2012",
    short: "16-Team Era II",
    years: range(2012, 2010),
  },
  {
    id: "era-original",
    title: "16-Team Era I — Original Divisions",
    range: "2006 – 2009",
    short: "16-Team Era I",
    years: range(2009, 2006),
  },
  {
    id: "era-12team",
    title: "12-Team Conference",
    range: "2005",
    short: "12-Team",
    years: [2005],
  },
  {
    id: "era-founding",
    title: "Founding",
    range: "2002 – 2004",
    short: "Founding",
    years: range(2004, 2002),
  },
];

function range(hi, lo) {
  const out = [];
  for (let y = hi; y >= lo; y--) out.push(y);
  return out;
}

/* ---------- Rendering helpers ---------- */
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function record(p) {
  if (p == null) return "";
  if (p.w == null) return "";
  const t = p.t && p.t > 0 ? `-${p.t}` : "";
  return `${p.w | 0}-${p.l | 0}${t}`;
}

function formatPrice(p) {
  return "$" + (p | 0);
}

function renderCollapsedTile(year) {
  const b = byYear[year];
  const isFounding = year >= 2002 && year <= 2004;
  let champLine;
  if (year === 2002) {
    const names = b.coChampions.map(c => c.owner).join(" & ");
    champLine = `<span class="trophy">&#x1F3C6;</span> Co-Champs: ${esc(names)}`;
  } else if (b.champion) {
    champLine = `<span class="trophy">&#x1F3C6;</span> ${esc(b.champion.owner)}`;
  } else {
    champLine = `<span class="trophy">&#x1F3C6;</span> &mdash;`;
  }

  const pill = isFounding ? `<div class="founding-pill">Founding Era</div>` : "";
  return `
    <div class="year-collapsed">
      ${pill}
      <div class="year-num">${year}</div>
      <p class="year-champ-line">${champLine}</p>
      <span class="year-chevron" aria-hidden="true">&#x276F;</span>
    </div>
  `;
}

function renderWinnerCard(label, person, icon) {
  if (!person) {
    return `<div class="winner-card no-data">
      <div class="winner-label">${label}</div>
      <div class="winner-owner">${icon} &mdash;</div>
    </div>`;
  }
  const rec = record(person);
  return `<div class="winner-card">
    <div class="winner-label">${label}</div>
    <div class="winner-owner">${icon} ${esc(person.owner)}</div>
    ${person.team ? `<div class="winner-team">${esc(person.team)}</div>` : ""}
    ${rec ? `<div class="winner-record">${rec}</div>` : ""}
  </div>`;
}

function renderWinnersRow(year, b) {
  if (year === 2002) {
    const co1 = b.coChampions[0] || null;
    const co2 = b.coChampions[1] || null;
    return `<div class="winners-row">
      ${renderWinnerCard("Co-Champion", co1, "&#x1F3C6;")}
      ${renderWinnerCard("Co-Champion", co2, "&#x1F3C6;")}
    </div>`;
  }
  return `<div class="winners-row">
    ${renderWinnerCard("Champion", b.champion, "&#x1F3C6;")}
    ${renderWinnerCard("Runner-Up", b.runnerUp, "&#x1F948;")}
  </div>`;
}

function renderDivisionWinners(b, year) {
  if (year <= 2004) return "";
  if (!b.divisionWinners.length) return "";
  const rows = b.divisionWinners.map(d => `
    <div class="div-row">
      <span class="div-pill">${esc(d.division)}</span>
      <span class="div-team">${esc(d.team)}</span>
      <span class="div-owner">${esc(d.owner)}</span>
    </div>`).join("");
  return `<div class="exp-section">
    <h3 class="exp-section-head">Division Winners</h3>
    <div class="div-winners">${rows}</div>
  </div>`;
}

function renderPlayoffs(b, year) {
  // No playoff data for founding era
  if (year <= 2004) return "";

  const usedOwners = new Set();
  const items = [];

  if (b.champion) {
    items.push(`<span class="top-team"><span class="badge">&#x1F3C6;</span>${esc(b.champion.owner)}</span>`);
    usedOwners.add(b.champion.owner);
  }
  if (b.runnerUp) {
    items.push(`<span class="top-team"><span class="badge">&#x1F948;</span>${esc(b.runnerUp.owner)}</span>`);
    usedOwners.add(b.runnerUp.owner);
  }

  b.playoffOwners.forEach(p => {
    if (usedOwners.has(p.owner)) return;
    items.push(`<span>${esc(p.owner)}</span>`);
    usedOwners.add(p.owner);
  });

  if (!items.length) return "";
  return `<div class="exp-section">
    <h3 class="exp-section-head">Playoff Teams</h3>
    <p class="playoff-list">${items.join(", ")}</p>
  </div>`;
}

function renderLowerTier(b, year) {
  if (year !== 2025) return "";
  const lc = b.lowerTierChamp;
  const lr = b.lowerTierRunnerUp;
  const pw = b.promotionWinner;
  if (!lc && !lr && !pw) return "";
  const cell = (label, p, icon) => p ? `
    <div class="lower-card">
      <div class="lower-label">${label}</div>
      <div class="lower-name">${icon} ${esc(p.owner)}</div>
      ${p.team ? `<div class="lower-team">${esc(p.team)}</div>` : ""}
    </div>` : `
    <div class="lower-card">
      <div class="lower-label">${label}</div>
      <div class="lower-name" style="color:var(--muted)">${icon} &mdash;</div>
    </div>`;
  return `<div class="exp-section">
    <h3 class="exp-section-head">Lower-Tier</h3>
    <div class="lower-grid">
      ${cell("Lower-Tier Champ", lc, "&#x1F3C6;")}
      ${cell("Lower-Tier Runner-Up", lr, "&#x1F948;")}
      ${cell("Promotion Showdown", pw, "&#x1F3AF;")}
    </div>
  </div>`;
}

function placeLabel(r, year) {
  if (year <= 2004) return "Founding Era";
  if (year >= 2025) {
    if (r.tier === "Lower") return "Lower-Tier";
    if (r.division && r.division.toLowerCase().indexOf("division") !== -1) {
      return `Upper-Tier &middot; ${esc(r.division)}`;
    }
    return r.tier ? `${esc(r.tier)}-Tier` : "Upper-Tier";
  }
  // 2005-2024: Tier · Conference · Division
  const parts = [];
  if (r.tier) parts.push(esc(r.tier));
  if (r.conf && r.conf !== "N/A") parts.push(esc(r.conf));
  if (r.division) parts.push(esc(r.division));
  return parts.join(" &middot; ");
}

function renderRoster(b, year) {
  // Dedup roster by owner; keep first entry
  const seen = new Set();
  const list = b.roster.filter(r => {
    if (!r.owner) return false;
    if (seen.has(r.owner)) return false;
    seen.add(r.owner);
    return true;
  });
  if (!list.length) return "";
  // Sort by owner name for stable display
  list.sort((a, b) => a.owner.localeCompare(b.owner));
  const rows = list.map(r => `
    <div class="roster-row">
      <span class="roster-owner">${esc(r.owner)}</span>
      <span class="roster-place">${placeLabel(r, year)}</span>
    </div>`).join("");
  return `<div class="exp-section">
    <h3 class="exp-section-head">Roster That Season</h3>
    <div class="roster-grid">${rows}</div>
  </div>`;
}

function renderDraft(b, year) {
  if (year <= 2004) return "";
  if (!b.draftPicks.length) return "";

  // Champion's top 3 (for 2002 use first co-champion)
  let champOwner = null;
  if (year === 2002 && b.coChampions.length) champOwner = b.coChampions[0].owner;
  else if (b.champion) champOwner = b.champion.owner;

  let champPicksHTML = "";
  if (champOwner) {
    const champPicks = b.draftPicks
      .filter(p => p.owner === champOwner)
      .sort((a, b) => b.price - a.price)
      .slice(0, 3);
    if (champPicks.length) {
      const rows = champPicks.map(p => `
        <div class="pick-row">
          <span class="pick-player"><span class="pick-trophy">&#x1F3C6;</span>${esc(p.player)}</span>
          <span class="pos-pill">${esc(p.position || "?")}</span>
          <span class="pick-price">${formatPrice(p.price)}</span>
        </div>`).join("");
      champPicksHTML = `<div class="draft-card">
        <h4 class="draft-card-title">${esc(champOwner)}'s Draft</h4>
        ${rows}
      </div>`;
    }
  }

  // League-wide top 3
  const allTop = b.draftPicks.slice().sort((a, b) => b.price - a.price).slice(0, 3);
  const topRows = allTop.map(p => {
    const isChamp = p.owner === champOwner;
    return `
      <div class="pick-row">
        <span class="pick-player">${isChamp ? '<span class="pick-trophy">&#x1F3C6;</span>' : ""}${esc(p.player)}</span>
        <span class="pos-pill">${esc(p.position || "?")}</span>
        <span class="pick-price">${formatPrice(p.price)}</span>
        <span class="pick-owner">${esc(p.owner)}</span>
      </div>`;
  }).join("");
  const topCardHTML = `<div class="draft-card">
    <h4 class="draft-card-title">Biggest Spends</h4>
    ${topRows}
  </div>`;

  return `<div class="exp-section">
    <h3 class="exp-section-head">Draft Highlights</h3>
    <div class="draft-row">
      ${champPicksHTML || '<div class="draft-card"><h4 class="draft-card-title">Champion\'s Draft</h4><p class="lower-team">No draft data available.</p></div>'}
      ${topCardHTML}
    </div>
    <a class="draft-link" href="draft.html?year=${year}">View full ${year} auction draft &rarr;</a>
  </div>`;
}

function renderExpanded(year, eraShort) {
  const b = byYear[year];
  return `<div class="year-expanded">
    <div class="exp-header">
      <span class="exp-year">${year}</span>
      <span class="era-chip">${esc(eraShort)}</span>
    </div>
    ${renderWinnersRow(year, b)}
    ${renderDivisionWinners(b, year)}
    ${renderPlayoffs(b, year)}
    ${renderLowerTier(b, year)}
    ${renderRoster(b, year)}
    ${renderDraft(b, year)}
    <div class="collapse-row">
      <button type="button" class="collapse-btn" data-collapse-year="${year}">Collapse &#x25B2;</button>
    </div>
  </div>`;
}

function renderTile(year, eraShort) {
  return `<div class="year-tile" data-year="${year}" role="button" tabindex="0" aria-expanded="false">
    ${renderCollapsedTile(year)}
    ${renderExpanded(year, eraShort)}
  </div>`;
}

function renderEra(era) {
  const tiles = era.years.map(y => renderTile(y, era.short)).join("");
  return `<section class="era-section" data-era="${era.id}">
    <header class="era-head">
      <h2 class="era-title">${esc(era.title)}</h2>
      <p class="era-range">${esc(era.range)}</p>
    </header>
    <div class="year-grid">${tiles}</div>
  </section>`;
}

function renderAll() {
  const container = document.getElementById("eraContainer");
  container.innerHTML = ERAS.map(renderEra).join("");
}

/* ---------- Interactivity ---------- */
function attachTileHandlers() {
  document.querySelectorAll(".year-tile").forEach(el => {
    function toggle() {
      const isExpanded = el.classList.contains("expanded");
      el.classList.toggle("expanded");
      el.setAttribute("aria-expanded", isExpanded ? "false" : "true");
    }
    el.addEventListener("click", e => {
      const target = e.target;
      if (target.closest(".collapse-btn")) return;
      if (target.closest(".draft-link")) return;
      // Ignore clicks inside expanded content other than the collapsed header
      if (el.classList.contains("expanded") && !target.closest(".year-collapsed")) return;
      toggle();
    });
    el.addEventListener("keydown", e => {
      if (e.key !== "Enter" && e.key !== " ") return;
      if (e.target !== el) return;
      e.preventDefault();
      toggle();
    });
  });

  document.querySelectorAll(".collapse-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const tile = btn.closest(".year-tile");
      if (tile) {
        tile.classList.remove("expanded");
        tile.setAttribute("aria-expanded", "false");
        // Scroll the now-collapsed tile back into view
        tile.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    });
  });

  document.querySelectorAll(".draft-link").forEach(a => {
    a.addEventListener("click", e => e.stopPropagation());
  });
}

renderAll();
attachTileHandlers();

/* ---------- Hamburger ---------- */
(function wireHamburger() {
  const btn = document.getElementById("navToggle");
  const nav = document.getElementById("primaryNav");
  if (!btn || !nav) return;
  btn.addEventListener("click", function () {
    const open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
  });
})();
</script>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2e50">
<title>Stats — MAFFL HQ</title>
<meta name="description" content="MAFFL All-Time Stats — career records and rankings for every MAFFL franchise. Sortable, filterable.">

<link rel="icon" href="maffl-logo.png" type="image/png">
<link rel="apple-touch-icon" href="maffl-logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="maffl-logo.png">
<meta name="apple-mobile-web-app-title" content="MAFFL HQ">
<meta name="application-name" content="MAFFL HQ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

  /* ---------- Header ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main / page title ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }
  .page-title-block { margin-bottom: 24px; }
  .page-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .gold-rule {
    height: 1px;
    background: var(--gold);
    border: 0;
    margin: 0;
  }

  /* ---------- Record cards ---------- */
  .record-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin: 24px 0 28px;
  }
  .record-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-height: 132px;
  }
  .record-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    line-height: 1;
    margin: 0 0 10px;
  }
  .record-value {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
  }
  .record-holder {
    font-family: var(--body);
    font-weight: 600;
    font-size: 14px;
    color: var(--navy);
    line-height: 1.25;
    margin: 0;
  }
  .record-holder.tied .record-tied-label {
    display: block;
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .record-holder.tied .record-tied-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .record-holder.tied .record-tied-list span {
    font-size: 13px;
    line-height: 1.2;
  }

  /* ---------- Filter pills ---------- */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 0 0 18px;
  }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 8px 16px;
    background: var(--surface);
    color: var(--navy);
    border: 1px solid var(--navy);
    border-radius: 100px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .filter-pill:hover { background: var(--navy-soft); }
  .filter-pill.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .filter-pill:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .pill-count {
    margin-left: 6px;
    font-weight: 700;
    opacity: 0.75;
  }

  /* ---------- Stats table ---------- */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .stats-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--body);
  }
  .stats-table thead th {
    position: sticky;
    top: 0;
    background: var(--navy);
    color: #fff;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 12px 10px;
    text-align: right;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--navy);
    z-index: 2;
  }
  .stats-table thead th.col-owner {
    text-align: left;
  }
  .stats-table thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    color: var(--gold);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.12s ease;
  }
  .stats-table thead th.sorted .sort-arrow { opacity: 1; }
  .stats-table thead th:hover { background: #223a64; }

  .stats-table tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.12s ease;
  }
  .stats-table tbody tr:nth-child(even) { background: var(--page-bg); }
  .stats-table tbody tr:first-child { border-top: 0; }
  .stats-table tbody tr:hover { background: var(--navy-soft); }
  .stats-table tbody td {
    padding: 12px 10px;
    font-size: 14px;
    color: var(--navy);
    text-align: right;
    white-space: nowrap;
  }
  .stats-table tbody td.col-owner {
    text-align: left;
    font-weight: 600;
    white-space: normal;
  }
  .stats-table td.gold-num { color: var(--gold-dark); font-weight: 700; }

  .inactive-chip {
    display: inline-block;
    margin-left: 8px;
    background: #eef0f4;
    color: #6c7891;
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
  }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-family: var(--body);
    font-size: 14px;
  }

  /* ---------- Mobile expansion ---------- */
  .mobile-only { display: none; }
  .mobile-row-toggle { display: none; }
  .mobile-detail-row { display: none; }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .site-nav { gap: 16px; }
    .site-nav a { font-size: 12px; }
  }

  @media (max-width: 767px) {
    .header-inner { padding: 12px 18px; }
    .brand-logo { height: 40px; }
    .brand-wordmark { font-size: 20px; }
    .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
    .site-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 18px var(--navy-soft);
      padding: 8px 0;
    }
    .site-nav.open { display: flex; }
    .site-nav a {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .site-nav a:last-child { border-bottom: 0; }
    .site-nav a.current { border-bottom: 1px solid var(--border); background: var(--page-bg); }

    main { padding: 24px 16px 40px; }
    .page-title { font-size: 24px; }

    .record-row {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .record-card { padding: 16px; min-height: 116px; }
    .record-value { font-size: 28px; }

    .filter-bar {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .filter-pill { flex: 0 0 auto; }

    /* hide secondary columns on mobile */
    .stats-table .col-runner,
    .stats-table .col-div,
    .stats-table .col-playoff,
    .stats-table .col-years,
    .stats-table .col-wins,
    .stats-table .col-losses { display: none; }

    .stats-table thead th { padding: 10px 8px; font-size: 10px; }
    .stats-table tbody td { padding: 12px 8px; font-size: 13px; }
    .stats-table tbody tr { cursor: pointer; }

    .mobile-row-toggle {
      display: inline-block;
      color: var(--muted);
      font-size: 12px;
      margin-left: 6px;
      transition: transform 0.15s ease;
    }
    .stats-table tbody tr.expanded .mobile-row-toggle {
      transform: rotate(180deg);
      color: var(--navy);
    }

    .stats-table tbody tr.mobile-detail-row { display: none; }
    .stats-table tbody tr.mobile-detail-row.show {
      display: table-row;
      background: var(--page-bg);
    }
    .stats-table tbody tr.mobile-detail-row td {
      padding: 14px 14px 18px;
      text-align: left;
    }
    .mobile-detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 10px;
    }
    .mobile-detail-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .mobile-detail-label {
      font-family: var(--display);
      font-weight: 700;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1;
    }
    .mobile-detail-value {
      font-family: var(--body);
      font-weight: 600;
      font-size: 15px;
      color: var(--navy);
      line-height: 1;
    }
    .mobile-detail-value.gold-num { color: var(--gold-dark); }
  }

  @media (prefers-reduced-motion: reduce) {
    .stats-table tbody tr, .filter-pill, .mobile-row-toggle, .site-nav a { transition: none; }
  }
</style>
</head>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="brand" aria-label="MAFFL HQ home">
      <img src="maffl-logo.png" alt="MAFFL" class="brand-logo">
      <span class="brand-wordmark">MAFFL HQ</span>
    </a>

    <button class="nav-toggle" id="navToggle" aria-controls="primaryNav" aria-expanded="false" aria-label="Open navigation">&#9776;</button>

    <nav class="site-nav" id="primaryNav" aria-label="Primary">
      <a href="weekly.html">Weekly</a>
      <a href="rules.html">Rulebook</a>
      <a href="power-rankings.html">Power Rankings</a>
      <a href="draft.html">Auction Draft</a>
      <a href="stats.html" class="current">Stats</a>
      <a href="history.html">History</a>
    </nav>
  </div>
</header>

<main>
  <div class="page-title-block">
    <h1 class="page-title">All-Time Stats</h1>
    <p class="page-subtitle">Career records and rankings for every MAFFL franchise</p>
    <hr class="gold-rule">
  </div>

  <section class="record-row" id="recordRow" aria-label="Record holders"></section>

  <div class="filter-bar" role="tablist" aria-label="Filter owners by status">
    <button class="filter-pill" data-filter="all" role="tab" aria-selected="false">All Owners <span class="pill-count" id="countAll"></span></button>
    <button class="filter-pill active" data-filter="active" role="tab" aria-selected="true">Active <span class="pill-count" id="countActive"></span></button>
    <button class="filter-pill" data-filter="inactive" role="tab" aria-selected="false">Inactive <span class="pill-count" id="countInactive"></span></button>
  </div>

  <div class="table-wrap">
    <table class="stats-table" id="statsTable" aria-label="All-time owner stats">
      <thead>
        <tr>
          <th class="col-owner" data-sort="name" scope="col">Owner<span class="sort-arrow"></span></th>
          <th class="col-champ" data-sort="champ" data-sort-default="desc" scope="col">&#x1F3C6; Champs<span class="sort-arrow"></span></th>
          <th class="col-runner" data-sort="runner" data-sort-default="desc" scope="col">&#x1F948; Runner-Up<span class="sort-arrow"></span></th>
          <th class="col-div" data-sort="div" data-sort-default="desc" scope="col">&#x1F451; Div Titles<span class="sort-arrow"></span></th>
          <th class="col-playoff" data-sort="playoff" data-sort-default="desc" scope="col">&#x1F39F; Playoff Apps<span class="sort-arrow"></span></th>
          <th class="col-years" data-sort="years" data-sort-default="desc" scope="col">Years<span class="sort-arrow"></span></th>
          <th class="col-wins" data-sort="wins" data-sort-default="desc" scope="col">Wins<span class="sort-arrow"></span></th>
          <th class="col-losses" data-sort="losses" data-sort-default="asc" scope="col">Losses<span class="sort-arrow"></span></th>
          <th class="col-winpct" data-sort="winPct" data-sort-default="desc" scope="col">Win %<span class="sort-arrow"></span></th>
          <th class="col-ovr" data-sort="ovr" data-sort-default="desc" scope="col">OVR<span class="sort-arrow"></span></th>
        </tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" hidden>No owners match this filter.</div>
  </div>
</main>

<footer class="site-footer">
  Est. 2002 &middot; Built by the Commish
</footer>

];

/* Pre-compute win% and decorate */
OWNERS.forEach(o => {
  const denom = o.wins + o.losses;
  o.winPct = denom > 0 ? (o.wins / denom) : 0;
});

const WIN_PCT_MIN_SEASONS = 5;

const COL_DEFS = [
  { key: "name",    label: "Owner",        type: "string" },
  { key: "champ",   label: "Champs",       type: "num", gold: v => v >= 2 },
  { key: "runner",  label: "Runner-Ups",   type: "num" },
  { key: "div",     label: "Div Titles",   type: "num" },
  { key: "playoff", label: "Playoff Apps", type: "num" },
  { key: "years",   label: "Years",        type: "num" },
  { key: "wins",    label: "Wins",         type: "num" },
  { key: "losses",  label: "Losses",       type: "num" },
  { key: "winPct",  label: "Win %",        type: "pct", gold: v => v >= 0.55 },
  { key: "ovr",     label: "OVR",          type: "num", gold: v => v >= 80 }
];
const COL_MAP = Object.fromEntries(COL_DEFS.map(c => [c.key, c]));

/* ---------- Record holders ---------- */
function formatPct(v) {
  return (Math.round(v * 1000) / 10).toFixed(1) + "%";
}

function findRecordHolders(metric, opts = {}) {
  let pool = OWNERS;
  if (opts.minYears) pool = pool.filter(o => o.years >= opts.minYears);
  if (pool.length === 0) return { value: 0, owners: [] };
  const best = pool.reduce((m, o) => o[metric] > m ? o[metric] : m, -Infinity);
  let leaders = pool.filter(o => o[metric] === best);
  /* Tie-break per spec for win%: if tied, show most tenured (single owner) */
  if (opts.tieBreakByYears && leaders.length > 1) {
    const maxYears = Math.max(...leaders.map(o => o.years));
    leaders = leaders.filter(o => o.years === maxYears);
  }
  return { value: best, owners: leaders };
}

function renderRecordCards() {
  const records = [
    {
      label: "Most Championships",
      ...findRecordHolders("champ"),
      format: v => v
    },
    {
      label: "Most Wins",
      ...findRecordHolders("wins"),
      format: v => v
    },
    {
      label: "Most Division Titles",
      ...findRecordHolders("div"),
      format: v => v
    },
    {
      label: "Highest Win %",
      ...findRecordHolders("winPct", { minYears: WIN_PCT_MIN_SEASONS, tieBreakByYears: true }),
      format: v => formatPct(v)
    }
  ];

  const row = document.getElementById("recordRow");
  row.innerHTML = records.map(r => {
    const tied = r.owners.length > 1;
    const holderHtml = tied
      ? `<div class="record-holder tied">
           <span class="record-tied-label">Tied:</span>
           <span class="record-tied-list">${r.owners.map(o => `<span>${o.name}</span>`).join("")}</span>
         </div>`
      : `<p class="record-holder">${r.owners[0] ? r.owners[0].name : "—"}</p>`;

    return `
      <article class="record-card">
        <p class="record-label">${r.label}</p>
        <p class="record-value">${r.format(r.value)}</p>
        ${holderHtml}
      </article>
    `;
  }).join("");
}

/* ---------- Filter pill counts ---------- */
function renderPillCounts() {
  const all = OWNERS.length;
  const act = OWNERS.filter(o => o.active).length;
  const inact = all - act;
  document.getElementById("countAll").textContent = `(${all})`;
  document.getElementById("countActive").textContent = `(${act})`;
  document.getElementById("countInactive").textContent = `(${inact})`;
}

/* ---------- Table render ---------- */
const state = {
  filter: "active",
  sortKey: "champ",
  sortDir: "desc", /* desc | asc */
  expandedRow: null /* mobile: index of expanded owner */
};

function formatCell(col, val) {
  if (col.type === "pct") return formatPct(val);
  return val;
}

function compare(a, b, key, dir) {
  const col = COL_MAP[key];
  let av = a[key], bv = b[key];
  let res;
  if (col.type === "string") {
    res = String(av).localeCompare(String(bv));
  } else {
    res = av - bv;
  }
  if (res === 0) {
    /* stable tiebreaker: champ desc, then winPct desc, then name asc */
    if (key !== "champ" && a.champ !== b.champ) return b.champ - a.champ;
    if (key !== "winPct" && a.winPct !== b.winPct) return b.winPct - a.winPct;
    return a.name.localeCompare(b.name);
  }
  return dir === "desc" ? -res : res;
}

function visibleOwners() {
  if (state.filter === "active") return OWNERS.filter(o => o.active);
  if (state.filter === "inactive") return OWNERS.filter(o => !o.active);
  return OWNERS.slice();
}

function renderTable() {
  const rows = visibleOwners().slice().sort((a, b) => compare(a, b, state.sortKey, state.sortDir));
  const body = document.getElementById("statsBody");
  const isMobile = window.matchMedia("(max-width: 767px)").matches;

  body.innerHTML = rows.map((o, i) => {
    const winPctStr = formatPct(o.winPct);
    const champCls = o.champ >= 2 ? " gold-num" : "";
    const winPctCls = o.winPct >= 0.55 ? " gold-num" : "";
    const ovrCls = o.ovr >= 80 ? " gold-num" : "";
    const inactiveChip = !o.active ? '<span class="inactive-chip">Inactive</span>' : "";
    const mobileChev = '<span class="mobile-row-toggle" aria-hidden="true">&#9662;</span>';

    const mainRow = `
      <tr data-key="${o.name.replace(/"/g, "&quot;")}" data-index="${i}">
        <td class="col-owner">${o.name}${inactiveChip}<span class="mobile-only-wrap">${isMobile ? mobileChev : ""}</span></td>
        <td class="col-champ${champCls}">${o.champ}</td>
        <td class="col-runner">${o.runner}</td>
        <td class="col-div">${o.div}</td>
        <td class="col-playoff">${o.playoff}</td>
        <td class="col-years">${o.years}</td>
        <td class="col-wins">${o.wins}</td>
        <td class="col-losses">${o.losses}</td>
        <td class="col-winpct${winPctCls}">${winPctStr}</td>
        <td class="col-ovr${ovrCls}">${o.ovr}</td>
      </tr>
    `;

    const detailRow = `
      <tr class="mobile-detail-row" data-detail-for="${i}">
        <td colspan="10">
          <div class="mobile-detail-grid">
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">&#x1F3C6; Champs</span>
              <span class="mobile-detail-value${champCls}">${o.champ}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">&#x1F948; Runner-Ups</span>
              <span class="mobile-detail-value">${o.runner}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">&#x1F451; Div Titles</span>
              <span class="mobile-detail-value">${o.div}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">&#x1F39F; Playoff Apps</span>
              <span class="mobile-detail-value">${o.playoff}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">Years</span>
              <span class="mobile-detail-value">${o.years}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">Wins</span>
              <span class="mobile-detail-value">${o.wins}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">Losses</span>
              <span class="mobile-detail-value">${o.losses}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">Win %</span>
              <span class="mobile-detail-value${winPctCls}">${winPctStr}</span>
            </div>
            <div class="mobile-detail-cell">
              <span class="mobile-detail-label">OVR</span>
              <span class="mobile-detail-value${ovrCls}">${o.ovr}</span>
            </div>
          </div>
        </td>
      </tr>
    `;
    return mainRow + detailRow;
  }).join("");

  document.getElementById("emptyState").hidden = rows.length > 0;

  /* refresh header sort indicators */
  document.querySelectorAll("#statsTable thead th").forEach(th => {
    const key = th.getAttribute("data-sort");
    const arrow = th.querySelector(".sort-arrow");
    if (key === state.sortKey) {
      th.classList.add("sorted");
      arrow.textContent = state.sortDir === "desc" ? "↓" : "↑";
      th.setAttribute("aria-sort", state.sortDir === "desc" ? "descending" : "ascending");
    } else {
      th.classList.remove("sorted");
      arrow.textContent = "";
      th.removeAttribute("aria-sort");
    }
  });

  /* reset mobile expansion when re-rendering */
  state.expandedRow = null;
}

/* ---------- Wire up interactions ---------- */
function wireFilters() {
  document.querySelectorAll(".filter-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const f = pill.getAttribute("data-filter");
      if (f === state.filter) return;
      state.filter = f;
      document.querySelectorAll(".filter-pill").forEach(p => {
        const isActive = p === pill;
        p.classList.toggle("active", isActive);
        p.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      renderTable();
    });
  });
}

function wireSort() {
  document.querySelectorAll("#statsTable thead th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.getAttribute("data-sort");
      const defaultDir = th.getAttribute("data-sort-default") || (COL_MAP[key].type === "string" ? "asc" : "desc");
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === "desc" ? "asc" : "desc";
      } else {
        state.sortKey = key;
        state.sortDir = defaultDir;
      }
      renderTable();
    });
  });
}

function wireMobileRowExpansion() {
  const body = document.getElementById("statsBody");
  body.addEventListener("click", (e) => {
    if (!window.matchMedia("(max-width: 767px)").matches) return;
    const row = e.target.closest("tr[data-index]");
    if (!row) return;
    const idx = row.getAttribute("data-index");
    const detail = body.querySelector(`tr.mobile-detail-row[data-detail-for="${idx}"]`);
    const wasOpen = row.classList.contains("expanded");

    /* collapse any other expanded row */
    body.querySelectorAll("tr.expanded").forEach(r => r.classList.remove("expanded"));
    body.querySelectorAll("tr.mobile-detail-row.show").forEach(r => r.classList.remove("show"));

    if (!wasOpen) {
      row.classList.add("expanded");
      if (detail) detail.classList.add("show");
      state.expandedRow = idx;
    } else {
      state.expandedRow = null;
    }
  });
}

function wireHamburger() {
  const btn = document.getElementById("navToggle");
  const nav = document.getElementById("primaryNav");
  btn.addEventListener("click", () => {
    const open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
  });
}

/* re-render on resize across mobile breakpoint so the mobile chev appears/disappears */
let lastWasMobile = window.matchMedia("(max-width: 767px)").matches;
window.addEventListener("resize", () => {
  const nowMobile = window.matchMedia("(max-width: 767px)").matches;
  if (nowMobile !== lastWasMobile) {
    lastWasMobile = nowMobile;
    renderTable();
  }
});

/* ---------- Boot ---------- */
renderRecordCards();
renderPillCounts();
wireFilters();
wireSort();
wireMobileRowExpansion();
wireHamburger();
renderTable();
</script>

</body>
</html>

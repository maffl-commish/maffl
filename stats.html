<script>
  /* Keep same-origin navigation inside the iOS Home-Screen standalone window.
     Without this, tapping an internal link hands off to Safari and the URL bar
     reappears. External / target=_blank links fall through to the Safari overlay. */
  (function () {
    if (!("standalone" in window.navigator) || !window.navigator.standalone) return;
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest("a[href]");
      if (!a || a.target === "_blank") return;
      if (a.host && a.host !== location.host) return;          // external link
      if (/^(mailto:|tel:|sms:)/i.test(a.getAttribute("href"))) return;
      e.preventDefault();
      location.href = a.href;                                  // stay in standalone
    }, false);
  })();
</script>

<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

  /* ---------- Header ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main / page title ---------- */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }
  .page-title-block { margin-bottom: 24px; }
  .page-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 14px;
  }
  .gold-rule {
    height: 1px;
    background: var(--gold);
    border: 0;
    margin: 0;
  }

  /* ---------- Filter pills ---------- */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 24px 0 18px;
  }
  .filter-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 8px 16px;
    background: var(--surface);
    color: var(--navy);
    border: 1px solid var(--navy);
    border-radius: 100px;
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .filter-pill:hover { background: var(--navy-soft); }
  .filter-pill.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .filter-pill:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
  .pill-count {
    margin-left: 6px;
    font-weight: 700;
    opacity: 0.75;
  }

  /* ---------- Stats table ---------- */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  /* Thin scrollbar */
  .table-wrap::-webkit-scrollbar { height: 8px; }
  .table-wrap::-webkit-scrollbar-track { background: var(--page-bg); }
  .table-wrap::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 100px;
  }
  .table-wrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  .table-wrap { scrollbar-width: thin; scrollbar-color: var(--border) var(--page-bg); }

  .stats-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-family: var(--body);
    font-variant-numeric: tabular-nums;
  }
  .stats-table thead th {
    background: var(--navy);
    color: #fff;
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 12px 10px;
    text-align: right;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--navy);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .stats-table thead th.col-owner {
    text-align: left;
    position: sticky;
    left: 0;
    top: 0;
    z-index: 3;
  }
  .stats-table thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    color: var(--gold);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.12s ease;
  }
  .stats-table thead th.sorted .sort-arrow { opacity: 1; }
  .stats-table thead th:hover { background: #223a64; }

  .stats-table tbody td {
    padding: 12px 10px;
    font-size: 14px;
    color: var(--navy);
    text-align: right;
    white-space: nowrap;
    border-top: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.12s ease;
  }
  .stats-table tbody tr:first-child td { border-top: 0; }
  .stats-table tbody tr:nth-child(even) td { background: var(--page-bg); }
  .stats-table tbody tr:hover td { background: var(--navy-soft); }

  .stats-table tbody td.col-owner {
    text-align: left;
    font-weight: 600;
    white-space: normal;
    position: sticky;
    left: 0;
    z-index: 1;
    box-shadow: 1px 0 0 var(--border);
  }

  .stats-table td.gold-num { color: var(--gold-dark); font-weight: 700; }

  .inactive-chip {
    display: inline-block;
    margin-left: 8px;
    background: #eef0f4;
    color: #6c7891;
    font-family: var(--display);
    font-weight: 700;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    vertical-align: middle;
  }

  /* Tooltip-aware emoji headers — native title attribute handles hover */
  .stats-table thead th[title] { cursor: help; }
  .stats-table thead th[data-sort][title] { cursor: pointer; }

  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--muted);
    font-family: var(--body);
    font-size: 14px;
  }

  /* ---------- Footer ---------- */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    font-family: var(--body);
    font-weight: 500;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 1024px) {
    .site-nav { gap: 16px; }
    .site-nav a { font-size: 12px; }
  }

  @media (max-width: 767px) {
    .header-inner { padding: 12px 18px; }
    .brand-logo { height: 40px; }
    .brand-wordmark { font-size: 20px; }
    .nav-toggle { display: inline-flex; align-items: center; justify-content: center; }
    .site-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 8px 18px var(--navy-soft);
      padding: 8px 0;

    .site-nav.open { display: flex; }
    .site-nav a {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .site-nav a:last-child { border-bottom: 0; }
    .site-nav a.current { border-bottom: 1px solid var(--border); background: var(--page-bg); }

    main { padding: 24px 16px 40px; }
    .page-title { font-size: 24px; }

    .filter-bar {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .filter-pill { flex: 0 0 auto; }

    .stats-table thead th { padding: 8px 6px; font-size: 10px; }
    .stats-table tbody td { padding: 8px 6px; font-size: 13px; }
    .inactive-chip { font-size: 8px; padding: 2px 5px; margin-left: 6px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .stats-table tbody td, .filter-pill, .site-nav a { transition: none; }
  }
</style>
</head>

  { name: "Nick Yankovich",                   active: true,  years: 1,  champ: 0, runner: 0, playoff: 0,  div: 0, wins: 5,   losses: 8,   ties: 0, ovr: 8,  clutch: 0,  grind: 13, heat: 47 },
  { name: "Dominic Nicastro",                 active: true,  years: 1,  champ: 0, runner: 0, playoff: 0,  div: 0, wins: 4,   losses: 8,   ties: 0, ovr: 7,  clutch: 0,  grind: 11, heat: 48 }
];

/* Pre-compute Win % using W / (W + L + T) */
OWNERS.forEach(o => {
  const denom = o.wins + o.losses + o.ties;
  o.winPct = denom > 0 ? (o.wins / denom) : 0;
});

const COL_DEFS = [
  { key: "name",    type: "string" },
  { key: "wins",    type: "num" },
  { key: "losses",  type: "num" },
  { key: "ties",    type: "num" },
  { key: "winPct",  type: "pct", gold: v => v >= 0.55 },
  { key: "champ",   type: "num", gold: v => v >= 2 },
  { key: "runner",  type: "num" },
  { key: "div",     type: "num" },
  { key: "playoff", type: "num" },
  { key: "ovr",     type: "num", gold: v => v >= 80 },
  { key: "clutch",  type: "num", gold: v => v >= 90 },
  { key: "grind",   type: "num", gold: v => v >= 90 },
  { key: "heat",    type: "num", gold: v => v >= 90 }
];
const COL_MAP = Object.fromEntries(COL_DEFS.map(c => [c.key, c]));

function formatPct(v) {
  return (Math.round(v * 1000) / 10).toFixed(1) + "%";
}

/* ---------- Filter pill counts ---------- */
function renderPillCounts() {
  const all = OWNERS.length;
  const act = OWNERS.filter(o => o.active).length;
  const inact = all - act;
  document.getElementById("countAll").textContent = `(${all})`;
  document.getElementById("countActive").textContent = `(${act})`;
  document.getElementById("countInactive").textContent = `(${inact})`;
}

/* ---------- Sort state ---------- */
const state = {
  filter: "active",
  sortKey: "champ",
  sortDir: "desc"
};

function compare(a, b, key, dir) {
  const col = COL_MAP[key];
  let av = a[key], bv = b[key];
  let res;
  if (col.type === "string") {
    res = String(av).localeCompare(String(bv));
  } else {
    res = av - bv;
  }
  const primary = dir === "desc" ? -res : res;
  if (primary !== 0) return primary;
  /* Default tiebreaker per spec: champ desc, then winPct desc, then name asc */
  if (key !== "champ" && a.champ !== b.champ) return b.champ - a.champ;
  if (key !== "winPct" && a.winPct !== b.winPct) return b.winPct - a.winPct;
  return a.name.localeCompare(b.name);
}

function visibleOwners() {
  if (state.filter === "active") return OWNERS.filter(o => o.active);
  if (state.filter === "inactive") return OWNERS.filter(o => !o.active);
  return OWNERS.slice();
}

function goldCls(key, val) {
  const col = COL_MAP[key];
  return (col.gold && col.gold(val)) ? " gold-num" : "";
}

function renderTable() {
  const rows = visibleOwners().slice().sort((a, b) => compare(a, b, state.sortKey, state.sortDir));
  const body = document.getElementById("statsBody");

  body.innerHTML = rows.map(o => {
    const winPctStr = formatPct(o.winPct);
    const inactiveChip = !o.active ? '<span class="inactive-chip">Inactive</span>' : "";
    return `
      <tr>
        <td class="col-owner">${o.name}${inactiveChip}</td>
        <td class="col-wins${goldCls("wins", o.wins)}">${o.wins}</td>
        <td class="col-losses${goldCls("losses", o.losses)}">${o.losses}</td>
        <td class="col-ties${goldCls("ties", o.ties)}">${o.ties}</td>
        <td class="col-winpct${goldCls("winPct", o.winPct)}">${winPctStr}</td>
        <td class="col-champ${goldCls("champ", o.champ)}">${o.champ}</td>
        <td class="col-runner${goldCls("runner", o.runner)}">${o.runner}</td>
        <td class="col-div${goldCls("div", o.div)}">${o.div}</td>
        <td class="col-playoff${goldCls("playoff", o.playoff)}">${o.playoff}</td>
        <td class="col-ovr${goldCls("ovr", o.ovr)}">${o.ovr}</td>
        <td class="col-clutch${goldCls("clutch", o.clutch)}">${o.clutch}</td>
        <td class="col-grind${goldCls("grind", o.grind)}">${o.grind}</td>
        <td class="col-heat${goldCls("heat", o.heat)}">${o.heat}</td>
      </tr>
    `;
  }).join("");

  document.getElementById("emptyState").hidden = rows.length > 0;

  document.querySelectorAll("#statsTable thead th").forEach(th => {
    const key = th.getAttribute("data-sort");
    const arrow = th.querySelector(".sort-arrow");
    if (key === state.sortKey) {
      th.classList.add("sorted");
      arrow.textContent = state.sortDir === "desc" ? "↓" : "↑";
      th.setAttribute("aria-sort", state.sortDir === "desc" ? "descending" : "ascending");
    } else {
      th.classList.remove("sorted");
      arrow.textContent = "";
      th.removeAttribute("aria-sort");
    }
  });
}

/* ---------- Wire up interactions ---------- */
function wireFilters() {
  document.querySelectorAll(".filter-pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const f = pill.getAttribute("data-filter");
      if (f === state.filter) return;
      state.filter = f;
      document.querySelectorAll(".filter-pill").forEach(p => {
        const isActive = p === pill;
        p.classList.toggle("active", isActive);
        p.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      renderTable();
    });
  });
}

function wireSort() {
  document.querySelectorAll("#statsTable thead th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.getAttribute("data-sort");
      const defaultDir = th.getAttribute("data-sort-default") || (COL_MAP[key].type === "string" ? "asc" : "desc");
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === "desc" ? "asc" : "desc";
      } else {
        state.sortKey = key;
        state.sortDir = defaultDir;
      }
      renderTable();
    });
  });
}

function wireHamburger() {
  const btn = document.getElementById("navToggle");
  const nav = document.getElementById("primaryNav");
  btn.addEventListener("click", () => {
    const open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");
  });
}

/* ---------- Boot ---------- */
renderPillCounts();
wireFilters();
wireSort();
renderTable();
</script>

</body>
</html>

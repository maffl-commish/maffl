<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a2e50">
<title>Rivalry Engine — MAFFL HQ</title>
<meta name="description" content="MAFFL Rivalry Engine — head-to-head, all-time records between every pair of owners in MAFFL history.">

<link rel="icon" href="maffl-logo.png" type="image/png">
<link rel="apple-touch-icon" href="maffl-logo.png">

<meta name="apple-mobile-web-app-title" content="MAFFL HQ">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script>
  /* Keep same-origin navigation inside the iOS Home-Screen standalone window.
     Without this, tapping an internal link hands off to Safari and the URL bar
     reappears. External / target=_blank links fall through to the Safari overlay. */
  (function () {
    var standalone = ("standalone" in window.navigator) && window.navigator.standalone;
    if (/[?&]diag=1/.test(location.search)) {
      window.addEventListener("DOMContentLoaded", function () {
        var b = document.createElement("div");
        b.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:99999;font:12px/1.45 monospace;color:#fff;padding:6px 10px;white-space:pre;background:" + (standalone ? "#0a7d4b" : "#c0392b");
        b.textContent = "navigator.standalone: " + standalone + "   display-mode: " + matchMedia("(display-mode: standalone)").matches + "\npage: " + location.pathname.split("/").pop() + "   referrer: " + (document.referrer || "(none)");
        b.addEventListener("click", function () { b.remove(); });
        document.body.appendChild(b);
      });
    }
    if (!standalone) return;
    document.addEventListener("click", function (e) {
      var a = e.target.closest && e.target.closest("a[href]");
      if (!a || a.target === "_blank") return;
      if (a.host && a.host !== location.host) return;          // external link
      if (/^(mailto:|tel:|sms:)/i.test(a.getAttribute("href"))) return;
      e.preventDefault();
      var url = a.href;
      if (/[?&]diag=1/.test(location.search) && url.indexOf("diag=1") === -1) url += (url.indexOf("?") === -1 ? "?" : "&") + "diag=1";
      location.href = url;                                  // stay in standalone
    }, false);
  })();
</script>
<meta name="application-name" content="MAFFL HQ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --surface: #ffffff;
    --page-bg: #f8f9fb;
    --navy: #1a2e50;
    --navy-soft: rgba(26, 46, 80, 0.08);
    --navy-shadow: rgba(26, 46, 80, 0.12);
    --navy-shadow-strong: rgba(26, 46, 80, 0.18);
    --gold: #f5a623;
    --gold-dark: #d98e10;
    --gold-soft: #fff4e0;
    --muted: #8a9ab5;
    --border: #e2e6ed;
    --win: #1d9e75;
    --loss: #c04a4a;
    --display: "Barlow Condensed", system-ui, sans-serif;
    --body: "Barlow", system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    color: var(--navy);
    background: var(--page-bg);
    font-feature-settings: "tnum" 1;
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.4;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }

  /* ---------- Header (matches index.html / power-rankings.html) ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-logo { height: 48px; width: auto; display: block; flex: 0 0 auto; }
  .brand-wordmark {
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    color: var(--navy);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .site-nav { display: flex; align-items: center; gap: 22px; }
  .site-nav a {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 2px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .site-nav a:hover { color: var(--gold-dark); }
  .site-nav a.current { border-bottom-color: var(--gold); }
  .nav-toggle {
    display: none;
    background: none;
    border: 0;
    color: var(--navy);
    font-size: 24px;
    line-height: 1;
    padding: 8px;
    cursor: pointer;
  }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ---------- Main / page title ---------- */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 56px;
  }

  /* ---------- Universal Subpage Header ---------- */
  .page-header {
    position: relative;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 12px 20px;
    margin-bottom: 24px;
  }
  .page-header__id { min-width: 0; }
  .page-header__title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 32px;
    color: var(--navy);
    line-height: 1.1;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }
  .page-header__subtitle {
    font-family: var(--body);
    font-weight: 400;
    font-size: 14px;
    color: var(--muted);
    margin: 0;
  }
  .page-header__meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .meta-pill {
    display: inline-flex;
    align-items: center;
    background: #eceff4;
    color: var(--navy);
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.03em;
    line-height: 1;
    white-space: nowrap;
  }

  .gold-rule { height: 1px; background: var(--gold); border: 0; margin: 0 0 24px; }

  .section-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 12px;
  }

  /* ---------- Page tabs (mirrors rules.html) ---------- */
  .portal-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .portal-tab {
    appearance: none;
    background: none;
    border: 0;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    flex: 1 1 auto;
    text-align: center;
    min-height: 44px;
    padding: 10px 16px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .portal-tab:hover { color: var(--navy); }
  .portal-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
  .portal-tab:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .tab-panel[hidden] { display: none; }

  /* ---------- VS head scroll offset (clears the sticky site-header) ---------- */
  #vsResult { scroll-margin-top: 84px; }

  /* ---------- Collapsible explainer (both tabs; adapted from old legend) ---------- */
  .explain-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--navy-soft);
    margin-top: 24px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .explain-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    min-height: 48px;
    padding: 12px 16px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy);
    text-align: left;
  }
  .explain-toggle:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
  .explain-chev { font-size: 11px; color: var(--muted); transition: transform 0.15s ease; }
  .explain-toggle[aria-expanded="true"] .explain-chev { transform: rotate(180deg); }
  .explain-body { padding: 0 16px 14px; }
  .explain-h {
    font-family: var(--display); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold-dark);
    margin: 14px 0 4px;
  }
  .explain-list { list-style: none; margin: 0; padding: 0; }
  .explain-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-top: 1px solid var(--border);
    font-family: var(--body);
    font-size: 14px;
    color: var(--navy);
    line-height: 1.45;
  }
  .explain-list li:first-child { border-top: 0; }
  .explain-emoji { flex: 0 0 auto; font-size: 17px; min-width: 26px; text-align: center; }
  .explain-list strong { font-weight: 700; }

  /* ---------- Filter bar ---------- */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 26px; }
  .filter-pill {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 6px;
    min-height: 40px;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--display);
    font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted);
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
  }
  .filter-pill[aria-pressed="true"] {
    background: var(--navy); color: #fff; border-color: var(--navy);
  }
  .filter-pill:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .filter-count { font-weight: 500; font-size: 11px; opacity: 0.85; }

  /* ---------- Owner pills ---------- */
  .owner-pillbox {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 2px 8px var(--navy-soft);
    margin-bottom: 32px;
  }
  .owner-status {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; flex-wrap: wrap;
    padding: 2px 2px 14px;
    text-align: center;
  }
  .owner-status .os-slot { display: inline-flex; align-items: baseline; gap: 6px; }
  .owner-status .os-tag {
    font-family: var(--display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted);
  }
  .owner-status .os-name {
    font-family: var(--display); font-weight: 700; font-size: 16px;
  }
  .owner-status .os-name-1 { color: var(--gold-dark); }
  .owner-status .os-name-2 { color: var(--navy); }
  .owner-status .os-empty { font-family: var(--body); color: var(--muted); font-weight: 500; font-size: 13px; }
  .owner-status .os-vs {
    font-family: var(--display); font-weight: 700;
    font-size: 12px; letter-spacing: 0.1em; color: var(--muted);
  }
  .owner-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }
  .owner-pill {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    width: 100%; text-align: left;
    min-height: 44px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--page-bg);
    font-family: var(--body); font-weight: 700; font-size: 13.5px;
    color: var(--navy);
    line-height: 1.15;
    transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .owner-pill:hover { border-color: var(--gold); }
  .owner-pill:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .owner-pill[data-state="a"] {
    background: var(--gold); border-color: var(--gold-dark); color: var(--navy);
  }
  .owner-pill[data-state="b"] {
    background: var(--navy); border-color: var(--navy); color: #fff;
  }
  .owner-pill .op-badge {
    flex: 0 0 auto;
    font-family: var(--display); font-weight: 700; font-size: 11px;
    border-radius: 999px; padding: 2px 8px;
    background: rgba(255, 255, 255, 0.4);
  }
  .owner-pill[data-state="b"] .op-badge { background: rgba(255, 255, 255, 0.22); }
  .owner-empty { font-family: var(--body); font-size: 13px; color: var(--muted); padding: 8px 2px; }

  /* Pill record-preview chips (shown vs Owner 1) */
  .owner-pill .op-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .op-rec {
    flex: 0 0 auto;
    font-size: 11px; font-weight: 700;
    border-radius: 999px; padding: 2px 7px; margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }
  .owner-pill.never-met { opacity: 0.45; }
  .owner-pill.never-met .op-rec { background: var(--navy-soft); color: var(--muted); }

  /* ---------- VS Explorer ---------- */
  .vs-explorer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    box-shadow: 0 2px 10px var(--navy-soft);
  }
  .vs-msg {
    text-align: center;
    font-family: var(--body);
    font-size: 14px;
    color: var(--muted);
    padding: 22px 12px;
  }

  /* ---------- VS-the-field view (Owner 1 picked, Owner 2 empty) ---------- */
  .field-head {
    font-family: var(--display); font-weight: 700; font-size: 18px;
    text-align: center; color: var(--navy); margin-bottom: 4px;
  }
  .field-sub {
    font-family: var(--body); font-size: 13px; color: var(--muted);
    text-align: center; margin-bottom: 10px;
  }
  .field-sort { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
  .field-list { display: flex; flex-direction: column; }
  .field-row {
    width: 100%;
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    padding: 10px 4px; min-height: 44px;
    border-bottom: 1px solid var(--border);
    font-size: 13px; text-align: left;
    transition: background 0.12s ease;
  }
  .field-row:last-child { border-bottom: 0; }
  .field-row:hover, .field-row:active { background: var(--gold-soft); }
  .field-row:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }
  .field-name {
    flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: var(--body); font-weight: 700; color: var(--navy);
  }
  .field-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .field-emoji { font-size: 13px; white-space: nowrap; }
  .field-rec {
    font-family: var(--display); font-weight: 700; font-size: 13px;
    color: var(--navy); border-radius: 999px; padding: 2px 8px;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .field-last { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* Prominent VS header — overall record is the centerpiece */
  .vs-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 10px 16px;
    border-radius: 10px;
    margin-bottom: 14px;
  }
  .vs-head-names {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .vs-head-name {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    line-height: 1.1;
  }
  .vs-head-name-1 { color: var(--gold-dark); }
  .vs-head-name-2 { color: var(--navy); }
  .vs-head-rec {
    font-family: var(--display);
    font-weight: 700;
    font-size: 30px;
    color: var(--navy);
    border-radius: 10px;
    padding: 8px 20px;
    white-space: nowrap;
    text-align: center;
    line-height: 1.1;
  }
  .vs-head-split {
    font-family: var(--body);
    font-weight: 500;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  .vs-head-split strong { color: var(--navy); font-weight: 700; }
  .vs-head-vs {
    font-family: var(--display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* ---------- Rivalry tier badges ---------- */
  .badge-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .badge-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 11px;
    border-radius: 999px;
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    font-family: var(--display); font-weight: 700; font-size: 12.5px;
    color: var(--navy);
    white-space: nowrap;
  }
  .badge-chip .bc-emoji { font-size: 14px; }
  .badge-chip .bc-who { color: var(--gold-dark); font-weight: 700; }
  .badge-chip.open { background: var(--gold-soft); border-color: var(--gold-dark); }
  .badge-desc { font-size: 12.5px; color: var(--muted); text-align: center; padding: 4px 8px 10px; }

  /* Rivalry Rating pill + share button (in the VS head) */
  .vs-rating {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--display); font-weight: 700;
    border: 1px solid var(--gold);
    background: var(--gold-soft);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--navy);
  }
  .vs-rating strong { font-size: 16px; color: var(--navy); }
  .vs-share {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 12.5px;
    min-height: 40px;
    font-family: var(--display); font-weight: 700;
    color: var(--navy);
  }
  .vs-share:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* One-sentence rivalry blurb (between head and badge row) */
  .vs-blurb {
    font-size: 13.5px; font-style: italic; color: var(--muted);
    text-align: center; margin: 0 0 12px; padding: 0 8px;
  }

  /* Championship callout (below badge row) */
  .champ-callout {
    border: 1px solid var(--gold);
    background: var(--gold-soft);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  /* Tappable timeline bar caption */
  .tl-caption { font-size: 12px; text-align: center; color: var(--navy); padding: 4px 0; }

  /* Game log (All Meetings) — toggle styled like the removed legend toggle */
  .gamelog-toggle {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    width: 100%; min-height: 44px; padding: 9px 2px;
    font-family: var(--display); font-weight: 700; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--gold-dark);
    text-align: left;
  }
  .gamelog-toggle:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .gamelog-chev { font-size: 11px; color: var(--muted); transition: transform 0.15s ease; }
  .gamelog-toggle[aria-expanded="true"] .gamelog-chev { transform: rotate(180deg); }
  .gamelog-body { padding-top: 2px; }
  .gamelog-row {
    font-size: 12.5px; padding: 7px 2px;
    border-bottom: 1px solid var(--border);
    color: var(--navy); line-height: 1.4;
    overflow-wrap: anywhere;
  }
  .gamelog-row:last-child { border-bottom: 0; }
  .gamelog-row .gl-win-1 { color: var(--win); font-weight: 700; }
  .gamelog-row .gl-win-2 { color: var(--loss); font-weight: 700; }

  .vs-stats { display: flex; flex-direction: column; gap: 0; }
  .vs-stat {
    padding: 11px 2px;
    border-bottom: 1px solid var(--border);
  }
  .vs-stat:last-child { border-bottom: 0; }
  .vs-stat__label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .vs-stat__value {
    font-family: var(--body);
    font-size: 15px;
    font-weight: 500;
    color: var(--navy);
    line-height: 1.45;
  }
  .vs-stat__value strong { font-weight: 700; }
  .vs-stat__sub { color: var(--muted); font-size: 13px; }

  /* Postseason-by-round vertical list */
  .po-list { display: flex; flex-direction: column; gap: 5px; }
  .po-line { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .po-line .po-name { min-width: 96px; font-family: var(--display); font-weight: 700; }
  .po-line .po-dash { color: var(--muted); }

  .po-line .po-rec .po-who { color: var(--gold-dark); }
  .po-line .po-years { color: var(--muted); font-size: 13px; }

  /* ---------- Head-to-head margin timeline ---------- */
  .h2h-chart { margin-top: 4px; }
  .h2h-chart svg { width: 100%; height: auto; display: block; }
  .h2h-axis {
    display: flex; justify-content: space-between;
    font-family: var(--display); font-weight: 700; font-size: 11px;
    color: var(--muted); margin-top: 2px;

  .h2h-legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 16px;
    font-family: var(--body); font-size: 11px; color: var(--muted);
    margin-top: 6px;

  .h2h-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .h2h-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex: 0 0 auto; }

  /* ---------- Discovery Leaderboards ---------- */
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .lb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 8px;
    box-shadow: 0 2px 8px var(--navy-soft);

  .lb-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 16px;
    color: var(--navy);
    margin: 0 0 2px;
  }
  .lb-note {
    font-family: var(--body);
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 8px;
  }
  .lb-list { list-style: none; margin: 0; padding: 0; }
  .lb-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    text-align: left;
    min-height: 44px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    border-radius: 6px;
    transition: background 0.12s ease;

  .lb-row:last-child { border-bottom: 0; }
  .lb-row:hover, .lb-row:active { background: var(--gold-soft); }

  .lb-row__names {
    font-family: var(--body);

    font-size: 13.5px;
    color: var(--navy);

  .lb-row__right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .lb-emoji { font-size: 13px; letter-spacing: 1px; white-space: nowrap; }
  .lb-rating-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    padding: 0 5px;

    font-family: var(--display);
    font-weight: 700;
    font-size: 12.5px;
    line-height: 1;
    flex: 0 0 auto;

    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy);

 * MAFFL RIVALRY ENGINE  (rivalry.html, v1.0)
 * ---------------------------------------------------------------------
 * Self-contained. Consumes window.MATCHUPS_DATA (8-field rows):
 *   [year, week, tier, winnerName, winnerScore, loserName, loserScore, type]
 *   tier "U"/"L"   type "R"/"Q"/"S"/"C"/"T"  (Q/S/C/T = playoffs)
 * Builds a meeting-derived owner roster + a per-pair head-to-head index,
 * then renders: filter bar, tappable owner pills, discovery leaderboards,
 * and the anchored VS result (badges + stats + margin timeline).
 *
 * Two embedded data sources (no fetches):
 *   ACTIVE_NAMES  — owners with Active? == "Y" in MAFFL_Owners_Sheet_revised.csv
 *   DIVISION_DATA — [year, tier, conf, div, ownerName] from
 *                   MAFFL_Division_History_2005_2025.csv (same-division detection)
 * ===================================================================== */

/* ---- Helpers copied VERBATIM from power-rankings.html ---- */
function normalizeName(s) {
  return String(s == null ? "" : s)
    .replace(/\s+/g, " ").replace(/\s*\/\s*/g, " / ").trim().toLowerCase();
}
function escHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" })[c];
  });
}
/* Canonical owner short names — keyed by normalizeName() of the data display
   form (NOT legal names). Falls back to the full name when unmapped (inactive
   owners). Used in dense, repeating owner-only contexts; the owner-pill
   selector and the big VS header keep full names so picks stay confirmable. */
var SHORT_NAMES = {
  "joe reilly":"Joe","brian murello / ron murello":"Brian/Ron",
  "jon murello / rick simmons":"Jon/Rick","mike murello":"Mike",
  "david murello":"Dave","todd trozzo":"Troz","tony trozzo":"Tony",
  "chris johnson":"Johnson","jacob nickman":"Jake","bj funari":"BJ",
  "ben funari":"Ben","bob keslar":"Bo","dan reilly":"Dan",
  "jon fetrow":"Fetrow","ed peters":"Ed","tony brooks":"Brooks",
  "braiden snyder":"Braiden","charles lavrinc":"Charlie","sam lavrinc":"Sam",
  "nick yankovich":"Nick","dominic nicastro":"Dom"
};
function shortName(fullName) {
  var k = normalizeName(fullName);
  return SHORT_NAMES[k] || fullName;   // fall back to full name if unmapped
}
function winRateColor(pct) {
  var hue = Math.round(Math.max(0, Math.min(1, pct)) * 125); // 0=red, 125=green
  return "hsl(" + hue + ", 70%, 86%)";
}

(function wireHamburger() {
  var btn = document.getElementById("navToggle");

  btn.addEventListener("click", function () {
    var open = nav.classList.toggle("open");
    btn.setAttribute("aria-expanded", open ? "true" : "false");
    btn.setAttribute("aria-label", open ? "Close navigation" : "Open navigation");

})();

/* =====================================================================
 * OWNER ROSTER — derived from the names that appear in MATCHUPS_DATA.
 * ===================================================================== */
var ROSTER = [];          // [{ key, name }] sorted by display name
var ROSTER_BY_KEY = {};   // key -> { key, name }
(function buildRoster() {
  var rows = window.MATCHUPS_DATA || [];
  if (!rows.length) { console.warn("[rivalry] MATCHUPS_DATA not loaded."); return; }
  rows.forEach(function (r) {
    [r[3], r[5]].forEach(function (nm) {
      var key = normalizeName(nm);
      if (!key || ROSTER_BY_KEY[key]) return;
      ROSTER_BY_KEY[key] = { key: key, name: nm };
      ROSTER.push(ROSTER_BY_KEY[key]);
    });
  });
  ROSTER.sort(function (a, b) { return a.name.localeCompare(b.name); });
})();

  var nk = normalizeName(k);
  if (ROSTER_BY_KEY[nk]) return nk;
  if (PORTAL_ALIASES[k] && ROSTER_BY_KEY[PORTAL_ALIASES[k]]) return PORTAL_ALIASES[k];
  if (SLUG_TO_KEY[k]) return SLUG_TO_KEY[k];
  var sk = slugify(k);
  if (SLUG_TO_KEY[sk]) return SLUG_TO_KEY[sk];
  if (PORTAL_ALIASES[sk] && ROSTER_BY_KEY[PORTAL_ALIASES[sk]]) return PORTAL_ALIASES[sk];
  return null;
}

/* =====================================================================
 * RENDER STATE + LABELS
 * ===================================================================== */
var filterMode = "active";   // "active" | "all"
var fieldSort = "games";     // vs-the-field sort: "games" | "winpct" | "lastmet"
var sel1 = null, sel2 = null; // selected owner keys (Owner 1, Owner 2)
var vsResult = document.getElementById("vsResult");
var tlTitles = [];            // current timeline bar caption strings (index = data-i)

var TIER_LABEL = { U: "Upper", L: "Lower" };
var ROUND_NAME = { C: "Championship", S: "Semi", Q: "Quarter", T: "3rd" };
var ROUND_ORDER = ["C", "S", "Q", "T"];

function gameContext(g) { return "(" + g.year + ", Week " + g.week + ")"; }
function fmtPts(v) { return (Math.round(v * 100) / 100).toFixed(2).replace(/\.00$/, ""); }
function isActive(key) { return !!ACTIVE_KEYS[key]; }
function pairVisible(p) { return filterMode === "all" || (isActive(p.aKey) && isActive(p.bKey)); }

/* =====================================================================
 * FILTER BAR
 * ===================================================================== */
function setFilter(mode) {
  if (mode === filterMode) return;
  filterMode = mode;
  document.getElementById("filterActive").setAttribute("aria-pressed", mode === "active" ? "true" : "false");
  document.getElementById("filterAll").setAttribute("aria-pressed", mode === "all" ? "true" : "false");
  renderPills();
  renderVS();          // keep the field view (Owner 1 set, Owner 2 empty) filter-aware
  renderLeaderboards();
}

/* =====================================================================
 * OWNER PILLS
 * ===================================================================== */
function renderPills() {
  var grid = document.getElementById("ownerGrid");
  var list = ROSTER.filter(function (o) { return filterMode === "all" || isActive(o.key); });
  if (!list.length) { grid.innerHTML = '<div class="owner-empty">No owners to show.</div>'; renderStatus(); return; }
  grid.innerHTML = list.map(function (o) {
    var state = o.key === sel1 ? "a" : (o.key === sel2 ? "b" : "");
    var tag = state === "a" ? '<span class="op-badge">1</span>'
            : state === "b" ? '<span class="op-badge">2</span>' : "";
    // Record chip vs Owner 1 — shown on every pill except Owner 1's own.
    var hasChip = !!(sel1 && o.key !== sel1);
    var chip = "", neverMet = false;
    if (hasChip) {
      var pp = PAIR_INDEX[pairId(sel1, o.key)];
      if (pp) {
        var oneIsA = (pp.aKey === sel1);
        var w = oneIsA ? pp.aW : pp.bW, l = oneIsA ? pp.bW : pp.aW;
        var pct = (w + l) ? w / (w + l) : 0;
        chip = '<span class="op-rec" style="background:' + winRateColor(pct) +
          ';color:var(--navy)">' + w + "–" + l + '</span>';
      } else {
        neverMet = true;
        chip = '<span class="op-rec">—</span>';
      }
    }
    var nameSpan = hasChip ? '<span class="op-name">' + escHtml(o.name) + '</span>'
                           : '<span>' + escHtml(o.name) + '</span>';
    return '<button type="button" class="owner-pill' + (neverMet ? " never-met" : "") +
      '" data-key="' + escHtml(o.key) + '"' +
      (state ? ' data-state="' + state + '"' : "") +
      ' aria-pressed="' + (state ? "true" : "false") + '">' +
      nameSpan + tag + chip +
    '</button>';
  }).join("");
  grid.querySelectorAll(".owner-pill").forEach(function (btn) {
    btn.addEventListener("click", function () { tapOwner(btn.getAttribute("data-key")); });
  });
  renderStatus();
}

function renderStatus() {
  var s = document.getElementById("ownerStatus");
  function slot(tag, key, cls, emptyTxt) {
    return '<span class="os-slot"><span class="os-tag">' + tag + '</span>' +
      (key
        ? '<span class="os-name ' + cls + '">' + escHtml(ROSTER_BY_KEY[key].name) + '</span>'
        : '<span class="os-empty">' + emptyTxt + '</span>') +
    '</span>';
  }
  // With Owner 1 set, opponents can also be picked from the field rows.
  var o2Empty = sel1 ? "tap a pill or a row below" : "tap a pill";
  s.innerHTML = slot("Owner 1", sel1, "os-name-1", "tap a pill") +
    '<span class="os-vs">VS</span>' +
    slot("Owner 2", sel2, "os-name-2", o2Empty);
}

function tapOwner(key) {
  if (key === sel1) { sel1 = sel2; sel2 = null; }        // deselect Owner 1 (promote Owner 2)
  else if (key === sel2) { sel2 = null; }                 // deselect Owner 2
  else if (!sel1) { sel1 = key; }                         // fill Owner 1
  else if (!sel2) { sel2 = key; }                         // fill Owner 2
  else { sel1 = key; sel2 = null; }                       // both full -> fresh start
  renderPills();
  renderVS();
  syncHash();
  if (sel1 && sel2) scrollToVs();
}

/* =====================================================================
 * VS RESULT
 * ===================================================================== */
function statBlock(label, valueHtml) {
  return '<div class="vs-stat">' +
    '<div class="vs-stat__label">' + label + '</div>' +
    '<div class="vs-stat__value">' + valueHtml + '</div>' +
  '</div>';
}

function renderBadgeRow(p) {
  var b = computeBadges(p);
  if (!b.length) return "";
  return '<div class="badge-row">' + b.map(function (x) {
    var who = x.who ? ' <span class="bc-who">' + escHtml(shortName(ROSTER_BY_KEY[x.who].name)) + '</span>' : "";
    return '<button type="button" class="badge-chip" data-badge="' + escHtml(x.name) +
      '" aria-expanded="false"><span class="bc-emoji">' + x.emoji + '</span>' + x.name + who + '</button>';
  }).join("") + '</div>' +
  '<div class="badge-desc" id="badgeDesc" hidden></div>';
}

/* Gold callout listing each Championship (type "C") meeting, chronological. */
function champCalloutHtml(p) {
  var cs = p.games.filter(function (g) { return g.type === "C"; });
  if (!cs.length) return "";
  var lines = cs.map(function (g) {
    var hi = Math.max(g.aScore, g.bScore), lo = Math.min(g.aScore, g.bScore);
    return escHtml(g.year + " — " + g.winnerName + " won " + fmtPts(hi) + "–" + fmtPts(lo));
  });
  return '<div class="champ-callout">🏆 Championship meetings:<br>' + lines.join("<br>") + '</div>';
}

/* One-sentence rivalry blurb, first-match priority. Names are escHtml'd. */
function rivalryBlurb(p, k1, k2) {
  var n = p.meetings;
  var firstYear = n ? p.games[0].year : "";
  var streakName = p.curStreakKey ? escHtml(shortName(ROSTER_BY_KEY[p.curStreakKey].name)) : "";
  var otherKey = (p.curStreakKey === p.aKey) ? p.bKey : p.aKey;
  var otherName = escHtml(shortName(ROSTER_BY_KEY[otherKey].name));
  var hammerKey = p.aPct >= 0.5 ? p.aKey : p.bKey;
  var hammerName = escHtml(shortName(ROSTER_BY_KEY[hammerKey].name));
  var hammerW = Math.max(p.aW, p.bW), hammerL = Math.min(p.aW, p.bW);

  if (p.champMeetings > 0 && p.curStreakLen >= 3)
    return streakName + " has won " + p.curStreakLen + " straight, but the title-game history is what stings most here.";
  if ((p.aPct >= 0.75 || p.aPct <= 0.25) && n >= 5)
    return hammerName + " owns this one — " + hammerW + "–" + hammerL + " all time and showing no mercy.";
  if (p.curStreakLen >= 5)
    return streakName + " has haunted " + otherName + " for " + p.curStreakLen + " straight meetings.";
  if (n >= 10 && Math.abs(p.aW - p.bW) <= 1)
    return "Dead even after " + n + " meetings — somebody has to blink.";
  if (p.avgMargin < 5 && n >= 5)
    return "Every meeting is a coin flip — average margin just " + fmtPts(p.avgMargin) + " points.";
  if (p.poCount >= 3)
    return p.poCount + " playoff collisions and counting. This one matters in December.";
  if (p.curStreakLen >= 3)
    return streakName + " has taken " + p.curStreakLen + " in a row and the pressure is building.";
  var closers = [
    n + " meetings since " + firstYear + ". The book on this one is still being written.",
    n + " meetings since " + firstYear + " — this one's still finding its rhythm.",
    "Since " + firstYear + ", " + n + " meetings in and the story's just getting started.",
    n + " head-to-heads since " + firstYear + ". Plenty of chapters left to write.",
    "First met in " + firstYear + " · " + n + " meetings and counting."
  ];
  var pick = (n + (firstYear || 0)) % closers.length;
  return closers[pick];
}

/* Collapsible "All Meetings (N)" game log — newest first, Owner-1 perspective. */
function gameLogHtml(p, k1, k2) {
  var rows = p.games.slice().reverse().map(function (g) {
    var hi = Math.max(g.aScore, g.bScore), lo = Math.min(g.aScore, g.bScore);
    var m = Math.abs(g.aScore - g.bScore);
    var rnd = (g.type !== "R" && ROUND_NAME[g.type]) ? " · " + ROUND_NAME[g.type] : "";
    var cls = (g.winnerKey === k1) ? "gl-win-1" : "gl-win-2";
    return '<div class="gamelog-row">' + g.year + " Wk " + g.week + rnd + " — " +
      '<span class="' + cls + '">' + escHtml(g.winnerName) + '</span> ' +
      fmtPts(hi) + "–" + fmtPts(lo) + " (+" + fmtPts(m) + ")</div>";
  }).join("");
  return '<div class="vs-stat">' +
    '<button type="button" class="gamelog-toggle" aria-expanded="false" aria-controls="gamelogBody">' +
      '<span>All Meetings (' + p.meetings + ')</span>' +
      '<span class="gamelog-chev" aria-hidden="true">&#9662;</span>' +
    '</button>' +
    '<div class="gamelog-body" id="gamelogBody" hidden>' + rows + '</div>' +
  '</div>';
}

/* Reusable ratings/badges explainer (rendered into #explainH2H and #explainSugg). */
function explainerHtml(idSuffix) {
  var bodyId = "explainBody" + idSuffix;
  var bullets = [
    ["Volume", "total meetings (up to 25 pts)"],
    ["Closeness", "near-even record &amp; tight average margin (up to 25 pts)"],
    ["Postseason", "playoff meetings, bonus for a Championship clash (up to 20)"],
    ["Recency", "met recently (up to 15 pts)"],
    ["Drama", "nail-biters &amp; an active 3+ game streak (up to 15 pts)"]
  ];
  var rb = bullets.map(function (r) {
    return '<li><span class="explain-emoji">•</span><span><strong>' + r[0] + '</strong> — ' + r[1] + '</span></li>';
  }).join("");
  var bg = BADGE_ORDER.map(function (x) {
    return '<li><span class="explain-emoji">' + x.emoji + '</span><span><strong>' +
      x.name + '</strong> — ' + escHtml(BADGE_INFO[x.name]) + '</span></li>';
  }).join("");
  return '<div class="explain-box">' +
    '<button type="button" class="explain-toggle" aria-expanded="false" aria-controls="' + bodyId + '">' +
      '<span>Ratings &amp; Badges Key</span>' +
      '<span class="explain-chev" aria-hidden="true">&#9662;</span>' +
    '</button>' +
    '<div class="explain-body" id="' + bodyId + '" hidden>' +
      '<div class="explain-h">Rivalry Rating (0–100)</div>' +
      '<ul class="explain-list">' + rb + '</ul>' +
      '<div class="explain-h">Badge Guide</div>' +
      '<ul class="explain-list">' + bg + '</ul>' +
    '</div>' +
  '</div>';
}

function postseasonHtml(p, oneIsA, o1Name, o2Name) {
  var rounds = {};
  p.games.forEach(function (g) {
    if (g.type === "R" || !p.po[g.type]) return;
    var r = rounds[g.type] || (rounds[g.type] = { aw: 0, bw: 0, years: {} });
    if (g.winnerKey === p.aKey) r.aw++; else r.bw++;
    r.years[g.year] = true;
  });
  var lines = [];
  ROUND_ORDER.forEach(function (t) {
    var r = rounds[t];
    if (!r) return;
    var o1w = oneIsA ? r.aw : r.bw, o1l = oneIsA ? r.bw : r.aw;
    var ys = Object.keys(r.years).map(Number).sort(function (a, b) { return a - b; });
    // Name the round holder from Owner 1's perspective; "Even" when tied.
    var rec;
    if (o1w > o1l) rec = '<span class="po-who">' + escHtml(o1Name) + '</span> ' + o1w + "–" + o1l;
    else if (o1l > o1w) rec = '<span class="po-who">' + escHtml(o2Name) + '</span> ' + o1l + "–" + o1w;
    else rec = '<span class="po-who">Even</span> ' + o1w + "–" + o1l;
    lines.push('<div class="po-line">' +
      '<span class="po-name">' + ROUND_NAME[t] + '</span>' +
      '<span class="po-dash">—</span>' +
      '<span class="po-rec">' + rec + '</span>' +
      '<span class="po-years">(' + ys.join(", ") + ')</span>' +
    '</div>');
  });
  return lines.length ? '<div class="po-list">' + lines.join("") + '</div>' : "No playoff meetings.";
}

/* Inline SVG margin timeline: above the zero line = Owner 1 win, below = Owner 2. */
function renderTimeline(p, k1, k2) {
  var games = p.games;
  if (!games.length) return "";
  var W = 340, H = 132, padX = 8, midY = 62, maxBar = 48;
  var maxMargin = 0;
  games.forEach(function (g) { var m = Math.abs(g.aScore - g.bScore); if (m > maxMargin) maxMargin = m; });
  if (maxMargin <= 0) maxMargin = 1;
  var n = games.length;
  var step = (W - padX * 2) / n;
  var bw = Math.max(2, Math.min(step * 0.6, 16));
  function f(v) { return Math.round(v * 10) / 10; }

  tlTitles = [];
  var bars = games.map(function (g, i) {
    var m = Math.abs(g.aScore - g.bScore);
    var h = Math.max(2, m / maxMargin * maxBar);
    var o1won = (g.winnerKey === k1);
    var x = padX + i * step + step / 2 - bw / 2;
    var y = o1won ? midY - h : midY;
    var color = o1won ? "var(--win)" : "var(--loss)";
    var hi = Math.max(g.aScore, g.bScore), lo = Math.min(g.aScore, g.bScore);
    var rnd = (g.type !== "R" && ROUND_NAME[g.type]) ? " " + ROUND_NAME[g.type] : "";
    var title = g.year + " Wk" + g.week + rnd + " · " + fmtPts(hi) + "–" + fmtPts(lo) + " (+" + fmtPts(m) + ")";
    tlTitles.push(title);
    return '<rect data-i="' + i + '" x="' + f(x) + '" y="' + f(y) + '" width="' + f(bw) + '" height="' + f(h) + '" rx="1.5" fill="' + color + '">' +
      '<title>' + escHtml(title) + '</title></rect>';
  }).join("");

  var zero = '<line x1="' + padX + '" y1="' + midY + '" x2="' + (W - padX) + '" y2="' + midY +
    '" stroke="var(--border)" stroke-width="1"/>';
  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" ' +
    'aria-label="Head-to-head margin timeline, ' + escHtml(ROSTER_BY_KEY[k1].name) +
    ' wins above the line">' + zero + bars + '</svg>';

  var firstY = games[0].year, lastY = games[n - 1].year;
  return '<div class="vs-stat">' +
    '<div class="vs-stat__label">Margin Timeline</div>' +
    '<div class="h2h-chart">' + svg +
      '<div class="tl-caption" hidden></div>' +
      '<div class="h2h-axis"><span>' + firstY + '</span><span>' + lastY + '</span></div>' +
      '<div class="h2h-legend">' +
        '<span><i style="background:var(--win)"></i>' + escHtml(shortName(ROSTER_BY_KEY[k1].name)) + ' win</span>' +
        '<span><i style="background:var(--loss)"></i>' + escHtml(shortName(ROSTER_BY_KEY[k2].name)) + ' win</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* =====================================================================
 * VS-THE-FIELD — Owner 1 picked, Owner 2 empty: list every opponent met,
 * filter-aware, sortable, each row tappable into the full rivalry.
 * ===================================================================== */
function fieldSortBtn(mode, label) {
  return '<button type="button" class="filter-pill field-sort-btn" data-sort="' + mode +
    '" aria-pressed="' + (fieldSort === mode ? "true" : "false") + '">' + label + '</button>';
}

function renderField(k1) {
  var o1 = ROSTER_BY_KEY[k1];
  var opps = ALL_PAIRS.filter(function (p) { return p.aKey === k1 || p.bKey === k1; })
    .map(function (p) {
      var oneIsA = (p.aKey === k1);
      var oppKey = oneIsA ? p.bKey : p.aKey;
      var w = oneIsA ? p.aW : p.bW, l = oneIsA ? p.bW : p.aW;
      return { p: p, oppKey: oppKey, oppName: ROSTER_BY_KEY[oppKey].name,
        w: w, l: l, pct: (w + l) ? w / (w + l) : 0 };
    })
    .filter(function (e) { return filterMode === "all" || isActive(e.oppKey); });

  if (fieldSort === "winpct") {
    opps.sort(function (a, b) { return (b.pct - a.pct) || (b.p.meetings - a.p.meetings); });
  } else if (fieldSort === "lastmet") {
    opps.sort(function (a, b) { return (b.p.lastYear - a.p.lastYear) || (b.p.meetings - a.p.meetings); });
  } else {
    opps.sort(function (a, b) { return (b.p.meetings - a.p.meetings) || a.oppName.localeCompare(b.oppName); });
  }

  var head = '<div class="field-head">' + escHtml(o1.name) + ' vs the Field</div>' +
    '<div class="field-sub">Tap an opponent for the full rivalry.</div>';
  var sortRow = '<div class="field-sort" role="group" aria-label="Sort opponents">' +
    fieldSortBtn("games", "Games") + fieldSortBtn("winpct", "Win %") + fieldSortBtn("lastmet", "Last Met") +
    '</div>';

  var listHtml;
  if (!opps.length) {
    listHtml = '<div class="vs-msg">No opponents to show under this filter.</div>';
  } else {
    listHtml = '<div class="field-list">' + opps.map(function (e) {
      var emojis = badgeEmojis(e.p);
      var yy = "'" + String(e.p.lastYear).slice(-2);
      return '<button type="button" class="field-row" data-opp="' + escHtml(e.oppKey) + '">' +
        '<span class="field-name">' + escHtml(shortName(e.oppName)) + '</span>' +
        '<span class="field-right">' +
          (emojis ? '<span class="field-emoji">' + emojis + '</span>' : "") +
          '<span class="field-rec" style="background:' + winRateColor(e.pct) + '">' + e.w + "–" + e.l + '</span>' +
          '<span class="field-last">last ' + yy + '</span>' +
        '</span>' +
      '</button>';
    }).join("") + '</div>';
  }

  vsResult.innerHTML = head + sortRow + listHtml;

  // Sort toggles re-render the field in place.
  vsResult.querySelectorAll(".field-sort-btn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      fieldSort = btn.getAttribute("data-sort");
      renderField(k1);
    });
  });
  // Row tap fills Owner 2 -> existing full-VS render + hash + scroll.
  vsResult.querySelectorAll(".field-row").forEach(function (btn) {
    btn.addEventListener("click", function () { tapOwner(btn.getAttribute("data-opp")); });
  });
}

function renderVS() {
  var k1 = sel1, k2 = sel2;
  if (!k1) {
    vsResult.innerHTML = '<div class="vs-msg">Pick two owners above to see their all-time rivalry.</div>';
    return;
  }
  if (!k2) { renderField(k1); return; }   // Owner 1 set, Owner 2 empty -> vs-the-field
  if (k1 === k2) {
    vsResult.innerHTML = '<div class="vs-msg">Pick two different owners.</div>';
    return;
  }
  var p = PAIR_INDEX[pairId(k1, k2)];
  if (!p) {
    vsResult.innerHTML = '<div class="vs-msg">' + escHtml(ROSTER_BY_KEY[k1].name) +
      ' and ' + escHtml(ROSTER_BY_KEY[k2].name) + ' have never met.</div>';
    return;
  }

  var o1 = ROSTER_BY_KEY[k1], o2 = ROSTER_BY_KEY[k2];
  var oneIsA = (p.aKey === k1);
  var o1W = oneIsA ? p.aW : p.bW;
  var o1L = oneIsA ? p.bW : p.aW;
  var o1Pts = oneIsA ? p.aPts : p.bPts;
  var o2Pts = oneIsA ? p.bPts : p.aPts;
  var o1Pct = (o1W + o1L) ? o1W / (o1W + o1L) : 0;

  // Regular-season vs postseason split (Owner 1 perspective): type "R" = regular,
  // Q/S/C/T = postseason.
  var rsAw = 0, rsBw = 0, poAw = 0, poBw = 0;
  p.games.forEach(function (g) {
    var aWon = (g.winnerKey === p.aKey);
    if (g.type === "R") { if (aWon) rsAw++; else rsBw++; }
    else { if (aWon) poAw++; else poBw++; }
  });
  var rsW = oneIsA ? rsAw : rsBw, rsL = oneIsA ? rsBw : rsAw;
  var poW = oneIsA ? poAw : poBw, poL = oneIsA ? poBw : poAw;

  // Prominent overall record (Owner 1 perspective) is the centerpiece; the
  // smaller RS/PO split sits beneath it. The All-Time Record stat block is
  // intentionally folded in here, so it is not repeated below.
  // Tier split (Owner-1 perspective) — only when both tiers have meetings.
  var tr = p.tierRec, uTot = tr.U[0] + tr.U[1], lTot = tr.L[0] + tr.L[1], tierLine = "";
  if (uTot > 0 && lTot > 0) {
    var uW = oneIsA ? tr.U[0] : tr.U[1], uL = oneIsA ? tr.U[1] : tr.U[0];
    var lW = oneIsA ? tr.L[0] : tr.L[1], lL = oneIsA ? tr.L[1] : tr.L[0];
    tierLine = '<br>Upper: <strong>' + uW + "–" + uL + '</strong> &middot; Lower: <strong>' + lW + "–" + lL + '</strong>';
  }

  var emojis = badgeEmojis(p);
  var head =
    '<div class="vs-head">' +
      '<div class="vs-head-names">' +
        '<span class="vs-head-name vs-head-name-1">' + escHtml(o1.name) + '</span>' +
        '<span class="vs-head-vs">VS</span>' +
        '<span class="vs-head-name vs-head-name-2">' + escHtml(o2.name) + '</span>' +
      '</div>' +
      '<div class="vs-head-rec" style="background:' + winRateColor(o1Pct) + '">' +
        escHtml(shortName(o1.name)) + ' ' + o1W + "–" + o1L + '</div>' +
      '<div class="vs-head-split">Regular Season: <strong>' + rsW + "–" + rsL + '</strong>' +
        ' &middot; Postseason: <strong>' + poW + "–" + poL + '</strong>' + tierLine + '</div>' +
      '<div class="vs-rating">Rivalry Rating <strong>' + p.rating + '</strong>' +
        (emojis ? ' <span>' + emojis + '</span>' : "") + '</div>' +
      '<button type="button" class="vs-share">Share this rivalry</button>' +
    '</div>';

  var stats = [];

  // Postseason by round (vertical, leader named, with years).
  stats.push(statBlock("Postseason by Round", postseasonHtml(p, oneIsA, shortName(o1.name), shortName(o2.name))));

  // 3) Streaks.
  var curName = shortName(ROSTER_BY_KEY[p.curStreakKey].name);
  var curTxt = p.curStreakLen === 1
    ? escHtml(curName) + " won the most recent meeting"
    : escHtml(curName) + " has won the last " + p.curStreakLen;
  var o1Long = oneIsA ? p.longA : p.longB;
  var o2Long = oneIsA ? p.longB : p.longA;
  stats.push(statBlock("Streaks",
    '<strong>' + curTxt + '.</strong><br>' +
    '<span class="vs-stat__sub">Longest: ' + escHtml(shortName(o1.name)) + ' ' + o1Long +
    ' &middot; ' + escHtml(shortName(o2.name)) + ' ' + o2Long + '</span>'));

  // 4) Biggest blowout.
  var bl = p.blowout;
  stats.push(statBlock("Biggest Blowout",
    '<strong>' + escHtml(shortName(ROSTER_BY_KEY[bl.winnerKey].name)) + ' by ' + fmtPts(bl.margin) + '</strong> ' +
    '<span class="vs-stat__sub">' + fmtPts(Math.max(bl.aScore, bl.bScore)) + "–" + fmtPts(Math.min(bl.aScore, bl.bScore)) +
    ' ' + gameContext(bl) + '</span>'));

  // 5) Heartbreaker.
  var ht = p.heart;
  stats.push(statBlock("Heartbreaker",
    '<strong>' + escHtml(shortName(ROSTER_BY_KEY[ht.winnerKey].name)) + ' by ' + fmtPts(ht.margin) + '</strong> ' +
    '<span class="vs-stat__sub">' + fmtPts(Math.max(ht.aScore, ht.bScore)) + "–" + fmtPts(Math.min(ht.aScore, ht.bScore)) +
    ' ' + gameContext(ht) + '</span>'));

  // 6) Total points + average margin.
  stats.push(statBlock("Total Points",
    '<strong>' + escHtml(shortName(o1.name)) + ' ' + fmtPts(o1Pts) + '</strong> &middot; ' +
    '<strong>' + escHtml(shortName(o2.name)) + ' ' + fmtPts(o2Pts) + '</strong><br>' +
    '<span class="vs-stat__sub">Average margin ' + fmtPts(p.avgMargin) + '</span>'));

  // 7) Shared history — (a) seasons together as count + range, (b) same-division years.
  var ovYears = overlapYears(p.aKey, p.bKey);
  var ovCount = ovYears.length;
  var togetherTxt;
  if (ovCount === 0) {
    togetherTxt = "No overlapping seasons";
  } else if (ovCount === 1) {
    togetherTxt = "1 season together (" + ovYears[0] + ")";
  } else {
    var lo = ovYears[0], hi = ovYears[ovCount - 1];
    var hiTxt = (hi === DATA_MAX_YEAR) ? "present" : String(hi);
    togetherTxt = ovCount + " seasons together (" + lo + "–" + hiTxt + ")";
  }
  var divYears = sameDivisionYears(p.aKey, p.bKey);
  stats.push(statBlock("Shared History",
    '<strong>' + togetherTxt + '</strong><br>' +
    '<span class="vs-stat__sub">Same division: ' +
    (divYears.length ? divYears.join(", ") : "never") + '</span>'));

  // 8) Margin timeline.
  stats.push("");
  var chart = renderTimeline(p, k1, k2);

  // 9) Game log (All Meetings) — after the timeline.
  var gamelog = gameLogHtml(p, k1, k2);

  vsResult.innerHTML = head +
    '<p class="vs-blurb">' + rivalryBlurb(p, k1, k2) + '</p>' +
    renderBadgeRow(p) +
    champCalloutHtml(p) +
    '<div class="vs-stats">' + stats.join("") + chart + gamelog + '</div>';

  wireVSInteractions(p, k1, k2);
}

/* Wire taps for the freshly-injected VS markup: badge chips, share, game-log
 * toggle, and timeline bars. Re-run every render (innerHTML is rebuilt). */
function wireVSInteractions(p, k1, k2) {
  // Badge chips -> swap/toggle the shared description line.
  var row = vsResult.querySelector(".badge-row");
  var desc = document.getElementById("badgeDesc");
  if (row && desc) {
    row.addEventListener("click", function (e) {
      var btn = e.target.closest(".badge-chip");
      if (!btn) return;
      var wasOpen = btn.classList.contains("open");
      row.querySelectorAll(".badge-chip").forEach(function (c) {
        c.classList.remove("open"); c.setAttribute("aria-expanded", "false");
      });
      if (wasOpen) { desc.hidden = true; desc.textContent = ""; }
      else {
        btn.classList.add("open"); btn.setAttribute("aria-expanded", "true");
        desc.textContent = BADGE_INFO[btn.getAttribute("data-badge")] || "";
        desc.hidden = false;
      }
    });
  }

  // Share this rivalry -> Web Share or clipboard fallback.
  var share = vsResult.querySelector(".vs-share");
  if (share) {
    share.addEventListener("click", function () {
      var url = location.origin + location.pathname + "#vs=" +
        encodeURIComponent(k1) + "," + encodeURIComponent(k2);
      var title = ROSTER_BY_KEY[k1].name + " vs " + ROSTER_BY_KEY[k2].name + " — MAFFL Rivalry";
      try {
        if (navigator.share) {
          navigator.share({ title: title, url: url }).catch(function () {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function () {
            share.textContent = "Link copied!";
            setTimeout(function () { share.textContent = "Share this rivalry"; }, 2000);
          }).catch(function () {});
        }
      } catch (_) { /* user-cancelled share / unsupported — ignore */ }
    });
  }

  // Game-log collapse toggle.
  var glt = vsResult.querySelector(".gamelog-toggle");
  if (glt) {
    glt.addEventListener("click", function () {
      var body = vsResult.querySelector(".gamelog-body");
      var open = glt.getAttribute("aria-expanded") === "true";
      glt.setAttribute("aria-expanded", open ? "false" : "true");
      if (body) body.hidden = open;
    });
  }

  // Tappable timeline bars -> caption + highlight.
  var svg = vsResult.querySelector(".h2h-chart svg");
  var cap = vsResult.querySelector(".tl-caption");
  if (svg && cap) {
    svg.addEventListener("click", function (e) {
      var rect = e.target.closest("rect");
      if (!rect || rect.getAttribute("data-i") == null) return;
      var wasOn = rect.getAttribute("data-on") === "1";
      svg.querySelectorAll("rect[data-i]").forEach(function (r) {
        r.removeAttribute("stroke"); r.removeAttribute("stroke-width"); r.removeAttribute("data-on");
      });
      if (wasOn) { cap.hidden = true; cap.textContent = ""; }
      else {
        rect.setAttribute("stroke", "var(--navy)");
        rect.setAttribute("stroke-width", "1.5");
        rect.setAttribute("data-on", "1");
        cap.textContent = tlTitles[rect.getAttribute("data-i")] || "";
        cap.hidden = false;
      }
    });
  }
}

/* =====================================================================
 * DISCOVERY LEADERBOARDS — teaser (3 rows) + Show more, filter-aware.
 * ===================================================================== */
function renderLeaderboards() {
  var grid = document.getElementById("lbGrid");
  var MIN = 5;
  var pairs = ALL_PAIRS.filter(pairVisible);

  var mostPost = pairs.filter(function (p) { return p.poCount > 0; })
    .sort(function (a, b) { return (b.poCount - a.poCount) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: p.poCount + " clash" + (p.poCount === 1 ? "" : "es") }; });

  var closest = pairs.filter(function (p) { return p.meetings >= MIN; })
    .sort(function (a, b) { return Math.abs(a.aPct - 0.5) - Math.abs(b.aPct - 0.5) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: p.aW + "–" + p.bW }; });

  var lopsided = pairs.filter(function (p) { return p.meetings >= MIN; })
    .sort(function (a, b) { return Math.abs(b.aPct - 0.5) - Math.abs(a.aPct - 0.5) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) {
      var hi = Math.max(p.aW, p.bW), lo = Math.min(p.aW, p.bW);
      return { p: p, val: hi + "–" + lo };
    });

  var nailbiters = pairs.filter(function (p) { return p.nailbiters > 0; })
    .sort(function (a, b) { return (b.nailbiters - a.nailbiters) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: p.nailbiters + " game" + (p.nailbiters === 1 ? "" : "s") }; });

  // Featured: highest Rivalry Ratings (min 3 meetings).
  var topRated = pairs.filter(function (p) { return p.meetings >= 3; })
    .sort(function (a, b) { return (b.rating - a.rating) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: String(p.rating) }; });

  var longStreaks = pairs.filter(function (p) { return p.curStreakLen >= 3; })
    .sort(function (a, b) { return (b.curStreakLen - a.curStreakLen) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) {
      var firstName = ROSTER_BY_KEY[p.curStreakKey].name.split(/\s+/)[0];
      return { p: p, val: p.curStreakLen + " straight (" + firstName + ")" };
    });

  var highScoring = pairs.filter(function (p) { return p.meetings >= MIN; })
    .sort(function (a, b) { return (b.avgCombined - a.avgCombined) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: fmtPts(p.avgCombined) + " ppg" }; });

  var bigBlowouts = pairs.slice()
    .sort(function (a, b) { return (b.blowout.margin - a.blowout.margin) || (b.meetings - a.meetings); })
    .slice(0, 10)
    .map(function (p) { return { p: p, val: "+" + fmtPts(p.blowout.margin) }; });

  var budding = pairs.filter(function (p) {
      if (p.meetings < 2) return false;
      var firstY = p.games[0].year;
      // First met within the last 3 seasons, still a young series (<= 5 meetings).
      return firstY >= DATA_MAX_YEAR - 2 && p.meetings <= 5;
    })
    .sort(function (a, b) {
      // Newest first-meeting first, then more meetings = more developed.
      return (b.games[0].year - a.games[0].year) || (b.meetings - a.meetings);
    })
    .slice(0, 10)
    .map(function (p) {
      return { p: p, val: p.meetings + " game" + (p.meetings === 1 ? "" : "s") + " · since " + p.games[0].year };
    });

  var cards = [
    { title: "Top Rivalry Ratings", note: "Our hottest head-to-heads &middot; 0–100", rows: topRated },
    { title: "Most Postseason Clashes", note: "Quarterfinal through Championship", rows: mostPost },
    { title: "Closest Rivalries", note: "Tightest split &middot; min. 5 meetings", rows: closest },
    { title: "Most Lopsided", note: "One side dominates &middot; min. 5 meetings", rows: lopsided },
    { title: "Most Nail-Biters", note: "Games decided by ≤ 3.0 pts", rows: nailbiters },
    { title: "Longest Active Streaks", note: "Current head-to-head runs", rows: longStreaks },
    { title: "Budding Rivalries", note: "Fresh matchups still taking shape", rows: budding },
    { title: "Highest-Scoring Rivalries", note: "Avg combined points &middot; min. 5 meetings", rows: highScoring },
    { title: "Biggest Single-Game Blowouts", note: "Largest margin in one meeting", rows: bigBlowouts }
  ];

  grid.innerHTML = cards.map(function (c) {
    var body;
    if (c.rows.length) {
      var lis = c.rows.map(function (e, i) {
        var emojis = badgeEmojis(e.p);
        return '<li><button type="button" class="lb-row' + (i >= 2 ? " hidden-row" : "") + '" ' +
          'data-a="' + escHtml(e.p.aKey) + '" data-b="' + escHtml(e.p.bKey) + '">' +
          '<span class="lb-row__names">' + escHtml(shortName(e.p.aName)) +
            '<span class="lb-vs">vs</span>' + escHtml(shortName(e.p.bName)) + '</span>' +
          '<span class="lb-row__right">' +
            '<span class="lb-rating-chip" title="Rivalry Rating">' + e.p.rating + '</span>' +
            (emojis ? '<span class="lb-emoji">' + emojis + '</span>' : "") +
            '<span class="lb-row__val">' + e.val + '</span>' +
          '</span>' +
        '</button></li>';
      }).join("");
      body = '<ul class="lb-list">' + lis + '</ul>' +
        (c.rows.length > 2 ? '<button type="button" class="lb-more" data-expanded="0">Show more</button>' : "");
    } else {
      body = '<div class="lb-empty">Not enough data yet.</div>';
    }
    return '<div class="lb-card">' +
      '<h2 class="lb-title">' + c.title + '</h2>' +
      '<p class="lb-note">' + c.note + '</p>' +
      body +
    '</div>';
  }).join("");

  // Row tap -> load that pair into the VS result + update the hash (shareable).
  grid.querySelectorAll(".lb-row").forEach(function (btn) {
    btn.addEventListener("click", function () {
      loadPair(btn.getAttribute("data-a"), btn.getAttribute("data-b"));
    });
  });
  // Show more / Show less per board.
  grid.querySelectorAll(".lb-more").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var ul = btn.previousElementSibling;
      var expanded = btn.getAttribute("data-expanded") === "1";
      ul.querySelectorAll(".lb-row").forEach(function (r, idx) {
        if (idx >= 2) r.classList.toggle("hidden-row", expanded);
      });
      btn.setAttribute("data-expanded", expanded ? "0" : "1");
      btn.textContent = expanded ? "Show more" : "Show less";
    });
  });
}

/* =====================================================================
 * PAGE TABS (Head-to-Head / Discovery) — mirrors rules.html behavior:
 * toggle [hidden] on the matching .tab-panel + aria-selected + .active.
 * ===================================================================== */
function activateTab(name) {
  document.querySelectorAll(".portal-tab").forEach(function (t) {
    var selected = t.getAttribute("data-tab") === name;
    t.classList.toggle("active", selected);
    t.setAttribute("aria-selected", selected ? "true" : "false");
    var panel = document.getElementById(t.getAttribute("aria-controls"));
    if (panel) panel.hidden = !selected;
  });
}

/* =====================================================================
 * DEEP-LINKING (URL hash)
 *   rivalry.html#vs=keyA,keyB  → Head-to-Head tab, preselect both + render
 *   rivalry.html#owner=keyA    → Head-to-Head tab, preselect Owner 1 only
 * ===================================================================== */
function scrollToVs() {
  var el = document.getElementById("vsResult");
  if (!el) return;
  try { el.scrollIntoView({ behavior: "smooth", block: "start" }); }
  catch (_) { el.scrollIntoView(); }
}

function loadPair(aKey, bKey) {
  activateTab("h2h"); // cross-tab jump from a Discovery row
  var newHash = "#vs=" + encodeURIComponent(aKey) + "," + encodeURIComponent(bKey);
  if (location.hash === newHash) { applyHash(); } else { location.hash = newHash; }
  scrollToVs();
}

function syncHash() {
  var h = "";
  if (sel1 && sel2 && sel1 !== sel2) {
    h = "#vs=" + encodeURIComponent(sel1) + "," + encodeURIComponent(sel2);
  } else if (sel1) {
    h = "#owner=" + encodeURIComponent(sel1);
  }
  try { history.replaceState(null, "", location.pathname + location.search + h); }
  catch (_) { /* ignore */ }
}

function applyHash() {
  var h = location.hash || "";
  var mv = /(?:^|[#&])vs=([^&]+)/.exec(h);
  var mo = /(?:^|[#&])owner=([^&]+)/.exec(h);
  if (mv) {
    var parts = mv[1].split(",");
    sel1 = resolveKey(parts[0]);
    sel2 = resolveKey(parts[1]);
    activateTab("h2h");
  } else if (mo) {
    sel1 = resolveKey(mo[1]);
    sel2 = null;
    activateTab("h2h");
  }
  renderPills();
  renderVS();
}

/* ---- Boot ---- */
(function boot() {
  var activeResolved = ROSTER.filter(function (o) { return isActive(o.key); }).length;
  document.getElementById("countActive").textContent = "(" + activeResolved + ")";
  document.getElementById("countAll").textContent = "(" + ROSTER.length + ")";

  document.getElementById("filterActive").addEventListener("click", function () { setFilter("active"); });
  document.getElementById("filterAll").addEventListener("click", function () { setFilter("all"); });
  window.addEventListener("hashchange", applyHash);

  // Page tabs (Head-to-Head / Discovery).
  document.querySelectorAll(".portal-tab").forEach(function (t) {
    t.addEventListener("click", function () { activateTab(t.getAttribute("data-tab")); });
  });

  // Ratings & badges explainer — same block at the bottom of both tabs.
  document.getElementById("explainH2H").innerHTML = explainerHtml("H2H");
  document.getElementById("explainSugg").innerHTML = explainerHtml("Sugg");
  document.querySelectorAll(".explain-toggle").forEach(function (t) {
    t.addEventListener("click", function () {
      var body = document.getElementById(t.getAttribute("aria-controls"));
      var open = t.getAttribute("aria-expanded") === "true";
      t.setAttribute("aria-expanded", open ? "false" : "true");
      if (body) body.hidden = open;
    });
  });

  renderLeaderboards();
  applyHash(); // renders pills + VS (and applies any incoming #vs / #owner)

  var activePairs = ALL_PAIRS.filter(function (p) { return isActive(p.aKey) && isActive(p.bKey); }).length;
  console.log("[rivalry] active owners resolved:", activeResolved,
    "| pills (active):", activeResolved, "| pills (all):", ROSTER.length,
    "| pairs indexed:", ALL_PAIRS.length, "| active pairs:", activePairs,
    "| track-meet threshold:", Math.round(TRACK_THRESHOLD * 10) / 10);
})();
